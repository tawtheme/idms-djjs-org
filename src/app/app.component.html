<div class="app-container" *ngIf="isAuthenticated; else authLayout">
    <!-- Full Width Header -->
    <app-header 
        [isCollapsed]="isCollapsed()" 
        [title]="title()"
        (toggleCollapse)="onToggleCollapse()"
        #headerComponent>
    </app-header>
    
    <!-- Backdrop for mobile sidebar -->
    <div class="sidebar-backdrop" 
         *ngIf="isMobile() && !isCollapsed()"
         (click)="onToggleCollapse()"></div>
    
    <!-- Main Layout: Sidebar + Content Wrapper -->
    <div class="layout" [class.collapsed]="isCollapsed()">
        <app-sidenav 
            [isCollapsed]="isCollapsed()"
            [headerHeight]="headerHeight()"
            (closeSidebar)="onToggleCollapse()"></app-sidenav>
        <div class="content-wrapper" 
            #contentWrapper>
            <router-outlet />
        </div>
    </div>
</div>

<ng-template #authLayout>
    <router-outlet />
</ng-template>

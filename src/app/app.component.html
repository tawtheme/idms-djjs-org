<app-loading *ngIf="loading$ | async" [size]="'medium'" [type]="'spinner'" [overlay]="true"></app-loading>

<ng-container *ngIf="isAuthenticated; else authLayout">
    <app-header
        [title]="title()"
        [activeRoute]="activeRoute()"
        [breadcrumbs]="breadcrumbs()"
        (navigateTo)="onOpenPage($event)"
        (closePage)="onClosePage()"
        (sidenavToggle)="onSidenavToggle()">
    </app-header>
    <div class="sidenav-backdrop" [class.is-open]="sidenavOpen()" (click)="closeSidenav()"></div>
    <app-sidenav
        class="app-sidenav-drawer"
        [class.is-open]="sidenavOpen()"
        [isCollapsed]="false"
        (closeSidebar)="closeSidenav()">
    </app-sidenav>
    <div class="content-wrapper" #contentWrapper>
        <router-outlet />
    </div>
</ng-container>

<ng-template #authLayout>
    <router-outlet />
</ng-template>

<app-image-preview></app-image-preview>

<div class="launcher">
    <!-- Top Bar -->
    <div class="launcher-topbar">
        <div class="topbar-left">
            <img src="assets/img/logo.png" alt="Logo" class="topbar-logo" />
            <span class="topbar-title">IDMS ADMIN PANEL</span>
        </div>
        <div class="topbar-right">
            <span class="topbar-time">{{ currentTime }}</span>
            <button class="topbar-logout" (click)="logout()" type="button">
                <app-icon name="power_settings_new" />
                <span>Logout</span>
            </button>
        </div>
    </div>

    <!-- Body -->
    <div class="launcher-body">
        <!-- Filter Column -->
        <div class="filter-col">
            <button class="filter-btn"
                [class.active]="activeFilter === 'All'"
                (click)="activeFilter = 'All'">All</button>
            <button *ngFor="let group of groups"
                class="filter-btn"
                [class.active]="activeFilter === group.title"
                (click)="activeFilter = group.title">{{ group.title }}</button>
        </div>

        <!-- Grid -->
        <div class="launcher-grid">
            <button class="app-btn" *ngFor="let item of filteredItems"
                (click)="onCardClick(item.route)">
                <div class="app-icon" [style.background]="item.color + '18'" [style.color]="item.color">
                    <app-icon [name]="item.icon" />
                </div>
                <span class="app-label">{{ item.label }}</span>
            </button>
        </div>
    </div>
</div>

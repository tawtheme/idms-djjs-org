<div class="all-sewa-container">
    <div class="all-sewa-header">
        <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
        <button class="btn btn--primary btn--sm" type="button" (click)="openAddModal()">Add New</button>
    </div>

    <!-- Error state -->
    <div *ngIf="error && !isLoading" class="error-state">
        <p>{{ error }}</p>
        <button class="btn btn--primary btn--sm" (click)="loadSewas()">Retry</button>
    </div>

    <!-- Filter Section -->
    <div class="listing-search" *ngIf="!error">
        <div class="listing-search-item">
            <input type="search" class="form-control" placeholder="Search by Name or Type" [(ngModel)]="searchTerm"
                [ngModelOptions]="{ standalone: true }" (input)="onSearchChange()" />
        </div>
        <div class="listing-search-item">
            <app-dropdown [options]="typeOptions" [selectedValues]="selectedType" placeholder="Type"
                (selectionChange)="selectedType = $event; onSearchChange()" [closeOnSelect]="true">
            </app-dropdown>
            <button class="btn btn--secondary btn--sm" type="button" (click)="resetFilter()">
                <span class="material-icons">refresh</span>
                Reset
            </button>
        </div>
    </div>

    <!-- Sewa table -->
    <div class="listing-wrapper">
        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th class="checkbox-column">
                            <input type="checkbox" [checked]="isAllSelected()" [indeterminate]="isIndeterminate()"
                                (change)="toggleSelectAll($event)" (click)="$event.stopPropagation()">
                        </th>
                        <th (click)="sortBy('name')" class="sortable">
                            Name
                            <span class="material-icons sort-icon">{{ getSortIcon('name') }}</span>
                        </th>
                        <th (click)="sortBy('type')" class="sortable">
                            Type
                            <span class="material-icons sort-icon">{{ getSortIcon('type') }}</span>
                        </th>
                        <th (click)="sortBy('createdAt')" class="sortable">
                            Created At
                            <span class="material-icons sort-icon">{{ getSortIcon('createdAt') }}</span>
                        </th>
                        <th class="action-column">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <ng-container *ngIf="!isLoading">
                        <tr *ngFor="let sewa of sewas; trackBy: trackById" (click)="$event.stopPropagation()">
                            <td class="checkbox-column" (click)="$event.stopPropagation()">
                                <input type="checkbox" [checked]="selectedSewas.has(sewa.id)"
                                    (change)="toggleSelectSewa(sewa.id, $event)">
                            </td>
                            <td data-label="Name" class="name">
                                {{ sewa.name }}
                            </td>
                            <td data-label="Type">
                                {{ sewa.type }}
                            </td>
                            <td data-label="Created At" class="date">
                                {{ sewa.createdAt | date:'dd/MM/yyyy h:mm a' }}
                            </td>
                            <td data-label="Action" class="action-column" (click)="$event.stopPropagation()">
                                <app-menu-dropdown [options]="getActionOptions(sewa)"
                                    (selectionChange)="onAction(sewa, $event)">
                                </app-menu-dropdown>
                            </td>
                        </tr>
                        <!-- Empty state -->
                        <tr *ngIf="sewas.length === 0">
                            <td [attr.colspan]="5" class="empty-state-cell">
                                <app-empty-state
                                    [title]="searchTerm || selectedType.length > 0 ? 'No Results Found' : 'No Sewa Found'"
                                    [description]="searchTerm || selectedType.length > 0 ? 'No sewa match your search criteria.' : 'There are no sewa to display at the moment.'"
                                    [icon]="'work'" [size]="'small'">
                                </app-empty-state>
                            </td>
                        </tr>
                    </ng-container>
                    <!-- Loading cell -->
                    <tr *ngIf="isLoading">
                        <td [attr.colspan]="5" class="loading-cell">
                            <app-loading [size]="'medium'" [type]="'spinner'"></app-loading>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <app-pager *ngIf="!error" [total]="totalItems" [pageSize]="pageSize" [currentPage]="currentPage"
            [pageSizeOptions]="pageSizeOptions" (pageChange)="onPageChange($event)"
            (pageSizeChange)="onPageSizeChange($event)">
        </app-pager>
    </div>

    <!-- Add/Edit Sewa Modal -->
    <app-add-sewa-modal *ngIf="isAddModalOpen" [isOpen]="isAddModalOpen"
        [title]="isEditMode ? 'Edit Sewa' : 'Add New Sewa'" [initialData]="editingSewa" (close)="closeAddModal()"
        (submit)="onAddSewaSubmit($event)">
    </app-add-sewa-modal>

    <!-- Delete Confirmation Dialog -->
    <app-confirmation-dialog [isOpen]="isDeleteDialogOpen" [title]="'Delete Sewa'"
        [message]="'Are you sure you want to delete \'' + (sewaToDelete?.name || 'this sewa') + '\'? This action cannot be undone.'"
        [confirmLabel]="'Delete'" [confirmType]="'danger'" (confirm)="confirmDelete()" (cancel)="cancelDelete()">
    </app-confirmation-dialog>
</div>

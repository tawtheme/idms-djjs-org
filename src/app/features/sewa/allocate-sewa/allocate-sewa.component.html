<div class="allocate-sewa-container">
    <!-- Filter Section -->
    <div class="filters-section">
        <div class="filter-row">
            <div class="filter-group">
                <label>Sewa Assignment Branch</label>
                <app-dropdown [options]="branchOptions" [selectedValues]="selectedAssignmentBranch"
                    placeholder="Select Branch" [searchable]="true"
                    (selectionChange)="selectedAssignmentBranch = $event; onSearch()">
                </app-dropdown>
            </div>
            <div class="filter-group">
                <label>Task Branch</label>
                <app-dropdown [options]="branchOptions" [selectedValues]="selectedTaskBranch"
                    placeholder="Select Branch" [searchable]="true"
                    (selectionChange)="selectedTaskBranch = $event; onSearch()">
                </app-dropdown>
            </div>
            <div class="filter-group">
                <label>Corresponding Branch</label>
                <app-dropdown [options]="branchOptions" [selectedValues]="selectedCorrespondingBranch"
                    placeholder="None" [searchable]="true"
                    (selectionChange)="selectedCorrespondingBranch = $event; onSearch()">
                </app-dropdown>
            </div>
            <div class="filter-group">
                <label>Branch Search Type</label>
                <app-dropdown [options]="branchSearchTypeOptions" [selectedValues]="selectedBranchSearchType"
                    placeholder="Select Type" [searchable]="true"
                    (selectionChange)="selectedBranchSearchType = $event; onSearch()">
                </app-dropdown>
            </div>
        </div>

        <div class="filter-row">
            <div class="filter-group">
                <label>Sewa Type</label>
                <app-dropdown [options]="sewaTypeOptions" [selectedValues]="selectedSewaType" placeholder="Select Type"
                    [searchable]="true" (selectionChange)="onSewaTypeChange($event)">
                </app-dropdown>
            </div>
            <div class="filter-group">
                <label>Sewas</label>
                <app-dropdown [options]="sewaOptions" [selectedValues]="selectedSewa" placeholder="Select Sewa"
                    [searchable]="true" (selectionChange)="selectedSewa = $event; onSearch()">
                </app-dropdown>
            </div>
            <div class="filter-group">
                <label>Gender</label>
                <app-dropdown [options]="genderOptions" [selectedValues]="selectedGender" placeholder="None"
                    [searchable]="true" (selectionChange)="selectedGender = $event; onSearch()">
                </app-dropdown>
            </div>
            <div class="filter-group">
                <label>UID</label>
                <input type="text" class="form-control" [(ngModel)]="uid" placeholder="UID" (keyup.enter)="onSearch()"
                    (blur)="onSearch()">
            </div>
        </div>
    </div>

    <div class="allocate-sewa-content">
        <app-unallocated-section (allocate)="onAllocate($event)"></app-unallocated-section>
        <app-allocated-section
            [sewaAssignedBranchId]="selectedAssignmentBranch[0] || null"
            (unassign)="onUnassign($event)"></app-allocated-section>
    </div>
</div>

<ng-container *ngIf="showUnassignWarningModal">
    <div class="modal-backdrop is-open" (click)="closeUnassignWarning()"></div>
    <div class="modal confirmation-dialog is-open">
        <div class="confirmation-dialog__dialog modal-small">
            <button type="button" class="confirmation-dialog__close" (click)="closeUnassignWarning()" aria-label="Close dialog">
                <app-icon name="close" />
            </button>
            <div class="confirmation-dialog__body">
                <h3 class="confirmation-dialog__title">Warning!</h3>
                <p class="confirmation-dialog__message">{{ unassignWarningMessage }}</p>
            </div>
            <div class="confirmation-dialog__footer">
                <button type="button" class="btn btn--danger btn--md" (click)="confirmUnassignWarning()">YES, UNASSIGN</button>
                <button type="button" class="btn btn--secondary btn--md" (click)="closeUnassignWarning()">CANCEL</button>
            </div>
        </div>
    </div>
</ng-container>

<ng-container *ngIf="showUnassignModal">
    <div class="modal-backdrop is-open" (click)="closeUnassignModal()"></div>
    <div class="modal confirmation-dialog is-open">
        <div class="confirmation-dialog__dialog modal-small">
            <button type="button" class="confirmation-dialog__close" (click)="closeUnassignModal()" aria-label="Close dialog">
                <app-icon name="close" />
            </button>

            <div class="confirmation-dialog__icon-wrapper">
                <div class="confirmation-dialog__icon confirmation-dialog__icon--danger">
                    <app-icon name="help_outline" />
                </div>
            </div>

            <div class="confirmation-dialog__body">
                <h3 class="confirmation-dialog__title">Confirm Unassign</h3>
                <p class="confirmation-dialog__message">Are you sure you want to do this action?</p>

                <div class="unassign-form">
                    <div class="form-group">
                        <label>Reason <span class="required">*</span></label>
                        <app-dropdown
                            [options]="unassignReasonOptions"
                            [selectedValues]="selectedUnassignReason"
                            placeholder="Select reason"
                            [closeOnSelect]="true"
                            (selectionChange)="onUnassignReasonChange($event)"></app-dropdown>
                    </div>
                    <div class="form-group">
                        <label>Remarks</label>
                        <textarea class="form-control" [(ngModel)]="unassignRemarks" placeholder="Enter remarks" rows="3"></textarea>
                    </div>
                    <div class="form-group form-group--inline">
                        <label class="checkbox-inline">
                            <input type="checkbox" [(ngModel)]="checkUserAlreadyAssign" />
                            Check if user is already assigned
                        </label>
                    </div>
                    <div *ngIf="unassignError" class="unassign-error">{{ unassignError }}</div>
                </div>
            </div>

            <div class="confirmation-dialog__footer">
                <button type="button" class="btn btn--secondary btn--md" (click)="closeUnassignModal()" [disabled]="isUnassigning">Cancel</button>
                <button type="button" class="btn btn--danger btn--md" (click)="confirmUnassign()" [disabled]="isUnassigning">Submit</button>
            </div>
        </div>
    </div>
</ng-container>

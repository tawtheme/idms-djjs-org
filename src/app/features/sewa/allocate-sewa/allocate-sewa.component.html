<div class="allocate-sewa-container">
    <div class="allocate-sewa-header">
        <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
    </div>

    <!-- Filter Section -->
    <div class="filters-section">
        <div class="filter-row">
            <div class="filter-group">
                <label>Sewa Assignment Branch</label>
                <app-dropdown [options]="branchOptions" [selectedValues]="selectedAssignmentBranch"
                    placeholder="Select Branch" [searchable]="true"
                    (selectionChange)="selectedAssignmentBranch = $event; onSearch()">
                </app-dropdown>
            </div>
            <div class="filter-group">
                <label>Task Branch</label>
                <app-dropdown [options]="branchOptions" [selectedValues]="selectedTaskBranch"
                    placeholder="Select Branch" [searchable]="true"
                    (selectionChange)="selectedTaskBranch = $event; onSearch()">
                </app-dropdown>
            </div>
            <div class="filter-group">
                <label>Corresponding Branch</label>
                <app-dropdown [options]="branchOptions" [selectedValues]="selectedCorrespondingBranch"
                    placeholder="None" [searchable]="true"
                    (selectionChange)="selectedCorrespondingBranch = $event; onSearch()">
                </app-dropdown>
            </div>
            <div class="filter-group">
                <label>Branch Search Type</label>
                <app-dropdown [options]="branchSearchTypeOptions" [selectedValues]="selectedBranchSearchType"
                    placeholder="Select Type" [searchable]="true"
                    (selectionChange)="selectedBranchSearchType = $event; onSearch()">
                </app-dropdown>
            </div>
        </div>

        <div class="filter-row">
            <div class="filter-group">
                <label>Sewa Type</label>
                <app-dropdown [options]="sewaTypeOptions" [selectedValues]="selectedSewaType" placeholder="Select Type"
                    [searchable]="true" (selectionChange)="onSewaTypeChange($event)">
                </app-dropdown>
            </div>
            <div class="filter-group">
                <label>Sewas</label>
                <app-dropdown [options]="sewaOptions" [selectedValues]="selectedSewa" placeholder="Select Sewa"
                    [searchable]="true" (selectionChange)="selectedSewa = $event; onSearch()">
                </app-dropdown>
            </div>
            <div class="filter-group">
                <label>Gender</label>
                <app-dropdown [options]="genderOptions" [selectedValues]="selectedGender" placeholder="None"
                    [searchable]="true" (selectionChange)="selectedGender = $event; onSearch()">
                </app-dropdown>
            </div>
            <div class="filter-group">
                <label>UID</label>
                <input type="text" class="form-control" [(ngModel)]="uid" placeholder="UID" (keyup.enter)="onSearch()"
                    (blur)="onSearch()">
            </div>
        </div>
    </div>

    <div class="allocate-sewa-content">
        <app-unallocated-section (allocate)="onAllocate($event)"></app-unallocated-section>
        <app-allocated-section (unassign)="onUnassign($event)"></app-allocated-section>
    </div>
</div>

<div class="section allocated-section">
    <div class="section-header">
        <div class="section-title">Allocated</div>
    </div>

    <div class="section-controls">
        <div class="search-control">
            <input type="text" class="form-control" [(ngModel)]="searchTerm" placeholder="Search..."
                (keyup.enter)="onSearchEnter()">
        </div>
        <button class="btn btn--secondary btn--sm" type="button" (click)="onUnassign()"
            [disabled]="selectedIds.size === 0">
            Unassign
        </button>
    </div>

    <!-- Empty State -->
    <div *ngIf="filteredVolunteers.length === 0" class="allocated-state">
        <div class="no-data">No Allocated Volunteers Found</div>
    </div>

    <!-- Table (only shown when there's data) -->
    <div *ngIf="filteredVolunteers.length > 0" class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th class="checkbox-column">
                        <input
                            type="checkbox"
                            [checked]="isAllSelected()"
                            [indeterminate]="isIndeterminate()"
                            (change)="toggleSelectAll($event)"
                            (click)="$event.stopPropagation()">
                    </th>
                    <th>Head</th>
                    <th>Sub Head</th>
                    <th>Is Regular</th>
                    <th>Id</th>
                    <th>Badge No</th>
                    <th>Name</th>
                    <th>Image</th>
                    <th>Sewa</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let volunteer of filteredVolunteers; trackBy: trackById" (click)="$event.stopPropagation()">
                    <td class="checkbox-column" (click)="$event.stopPropagation()">
                        <input
                            type="checkbox"
                            [checked]="selectedIds.has(volunteer.id)"
                            (change)="toggleSelect(volunteer.id, $event)">
                    </td>
                    <td data-label="Head" (click)="$event.stopPropagation()">
                        <input type="checkbox"
                            [checked]="volunteer.headChecked"
                            [disabled]="volunteer.subHeadChecked"
                            (change)="toggleHead(volunteer, $event)" />
                    </td>
                    <td data-label="Sub Head" (click)="$event.stopPropagation()">
                        <input type="checkbox"
                            [checked]="volunteer.subHeadChecked"
                            [disabled]="volunteer.headChecked"
                            (change)="toggleSubHead(volunteer, $event)" />
                    </td>
                    <td data-label="Is Regular" (click)="$event.stopPropagation()">
                        <input type="checkbox"
                            [checked]="volunteer.isRegular"
                            (change)="toggleIsRegular(volunteer, $event)" />
                    </td>
                    <td data-label="Id">{{ volunteer.uniqueId || volunteer.id }}</td>
                    <td data-label="Badge No">{{ volunteer.badgeNo || '-' }}</td>
                    <td data-label="Name" class="name">{{ volunteer.name }}</td>
                    <td data-label="Image" class="image-column">
                        <div class="volunteer-image">
                            <img [src]="volunteer.image || '/assets/img/placeholder.svg'"
                                 [alt]="volunteer.name"
                                 onerror="this.src='/assets/img/placeholder.svg'">
                        </div>
                    </td>
                    <td data-label="Sewa">{{ volunteer.sewa || '-' }}</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Load More -->
    <div *ngIf="hasMore && filteredVolunteers.length > 0 && !isLoading" class="load-more">
        <button class="load-more__btn" type="button" (click)="loadMore()" [disabled]="isLoadingMore">
            <span class="load-more__count">Showing {{ volunteers.length }} of {{ totalItems }}</span>
            <span class="load-more__sep">-</span>
            {{ isLoadingMore ? 'Loading...' : 'Load More' }}
        </button>
    </div>
</div>

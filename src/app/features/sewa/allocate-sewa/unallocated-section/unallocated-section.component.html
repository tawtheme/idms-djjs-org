<div class="section unallocated-section">
    <div class="section-header">
        <h2 class="section-title">UnAllocated</h2>
    </div>

    <div class="section-controls">
        <div class="search-control">
            <input type="text" class="form-control" [(ngModel)]="searchTerm" placeholder="Search..."
                (keyup.enter)="onSearchEnter()">
        </div>
        <button class="btn btn--primary btn--sm" type="button" (click)="onAllocate()"
            [disabled]="selectedIds.size === 0">
            Allocate
        </button>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && volunteers.length === 0" class="unallocated-state">
        <div class="no-data">No unallocated volunteers found</div>
    </div>

    <!-- Table -->
    <div *ngIf="volunteers.length > 0" class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th class="checkbox-column">
                        <input type="checkbox"
                            [checked]="isAllSelected()"
                            [indeterminate]="isIndeterminate()"
                            (change)="toggleSelectAll($event)"
                            (click)="$event.stopPropagation()">
                    </th>
                    <th>Image</th>
                    <th>Id</th>
                    <th>Name</th>
                    <th>Phone</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let volunteer of volunteers; trackBy: trackById"
                    [class.selected]="selectedIds.has(volunteer.id)"
                    (click)="toggleSelect(volunteer.id, $event)">
                    <td class="checkbox-column" (click)="$event.stopPropagation()">
                        <input type="checkbox" [checked]="selectedIds.has(volunteer.id)"
                            (change)="toggleSelect(volunteer.id, $event)">
                    </td>
                    <td data-label="Image" class="image-column">
                        <div class="volunteer-image">
                            <img [src]="volunteer.image || '/assets/img/placeholder.svg'"
                                 [alt]="volunteer.name"
                                 onerror="this.src='/assets/img/placeholder.svg'">
                        </div>
                    </td>
                    <td data-label="Id">{{ volunteer.uniqueId || volunteer.id }}</td>
                    <td data-label="Name" class="name">{{ volunteer.name }}</td>
                    <td data-label="Phone">{{ volunteer.phone || '-' }}</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Load More -->
    <div *ngIf="hasMore && volunteers.length > 0 && !isLoading" class="load-more">
        <button class="load-more__btn" type="button" (click)="loadMore()" [disabled]="isLoadingMore">
            <span class="load-more__count">Showing {{ volunteers.length }} of {{ totalItems }}</span>
            <span class="load-more__sep">-</span>
            {{ isLoadingMore ? 'Loading...' : 'Load More' }}
        </button>
    </div>
</div>

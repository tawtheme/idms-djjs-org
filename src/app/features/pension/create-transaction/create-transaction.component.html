<div class="create-transaction-container">
    <div class="create-transaction-header" *ngIf="!hideBreadcrumbs && breadcrumbs && breadcrumbs.length > 0">
        <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
    </div>

    <div class="create-transaction-content" [class.no-header]="hideBreadcrumbs || !breadcrumbs || breadcrumbs.length === 0">
        <form class="transaction-form" (ngSubmit)="onSubmit()">
            <!-- Select Preacher - Full Width -->
            <div class="form-grid">
                <div class="form-field full-width">
                    <label for="preacher">Select Preacher</label>
                    <app-dropdown
                        [options]="preacherOptions"
                        [selectedValues]="selectedPreacher"
                        placeholder="Select Preacher"
                        (selectionChange)="onPreacherChange($event)"
                        [closeOnSelect]="true">
                    </app-dropdown>
                </div>
            </div>

            <!-- Pension Credit Amount and Pension Withdrawal Amount - Two Columns -->
            <div class="form-grid">
                <div class="form-field">
                    <label for="creditAmount">Pension Credit Amount</label>
                    <input
                        type="number"
                        id="creditAmount"
                        class="form-control"
                        [(ngModel)]="form.creditAmount"
                        [ngModelOptions]="{ standalone: true }"
                        placeholder="Enter credit amount"
                        step="0.01"
                        min="0">
                </div>

                <div class="form-field">
                    <label for="withdrawalAmount">Pension Withdrawal Amount</label>
                    <input
                        type="number"
                        id="withdrawalAmount"
                        class="form-control"
                        [(ngModel)]="form.withdrawalAmount"
                        [ngModelOptions]="{ standalone: true }"
                        placeholder="Enter withdrawal amount"
                        step="0.01"
                        min="0">
                </div>
            </div>

            <!-- Pension Credit Date and Pension Withdrawal Date - Two Columns -->
            <div class="form-grid">
                <div class="form-field">
                    <label for="creditDate">Pension Credit Date</label>
                    <app-datepicker
                        [value]="form.creditDate"
                        placeholder="Select date"
                        format="dd/MM/yyyy"
                        (dateChange)="onCreditDateChange($event)">
                    </app-datepicker>
                </div>

                <div class="form-field">
                    <label for="withdrawalDate">Pension Withdrawal Date</label>
                    <app-datepicker
                        [value]="form.withdrawalDate"
                        placeholder="Select date"
                        format="dd/MM/yyyy"
                        (dateChange)="onWithdrawalDateChange($event)">
                    </app-datepicker>
                </div>
            </div>

            <!-- Remarks - Full Width -->
            <div class="form-field">
                <label for="remarks">Remarks</label>
                <textarea
                    id="remarks"
                    class="form-control"
                    [(ngModel)]="form.remarks"
                    [ngModelOptions]="{ standalone: true }"
                    placeholder="Enter remarks"
                    rows="4">
                </textarea>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn--secondary btn--md" (click)="onReset()">
                    Reset
                </button>
                <button type="submit" class="btn btn--primary btn--md">
                    Submit
                </button>
            </div>
        </form>
    </div>
</div>

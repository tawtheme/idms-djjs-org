<div class="visitors-container">
    <div class="visitors-header">
        <button class="btn btn--primary btn--sm" type="button" (click)="openCreateVisitorModal()">Create Visitor</button>
    </div>

    <!-- Filter Section -->
    <div class="listing-search">
        <div class="listing-search-item">
            <input
                type="search"
                class="form-control"
                placeholder="Search by Name, Mobile No., Relation Name, or UID"
                [(ngModel)]="searchTerm"
                [ngModelOptions]="{ standalone: true }"
                (input)="onSearchChange()"/>
        </div>
        <div class="listing-search-item">
            <app-dropdown
                [options]="genderOptions"
                [selectedValues]="selectedGender"
                placeholder="Gender"
                (selectionChange)="selectedGender = $event; onSearchChange()"
                [closeOnSelect]="true">
            </app-dropdown>
            <app-dropdown
                [options]="sortOrderOptions"
                [selectedValues]="sortOrder"
                placeholder="Sort By"
                (selectionChange)="sortOrder = $event; onSearchChange()"
                [closeOnSelect]="true">
            </app-dropdown>
            <div class="export-button-wrapper" #exportWrapper>
                <button class="btn btn--secondary btn--sm export-trigger" 
                        type="button"
                        (click)="toggleExportMenu()">
                    <app-icon name="file_download" />
                    <span>Export</span>
                    <app-icon name="keyboard_arrow_down" />
                </button>
                <div class="export-menu" *ngIf="exportMenuOpen">
                    <button class="export-menu-item" 
                            (click)="onExportAction({id: 'export', value: 'export'})">
                        <app-icon name="download" />
                        <span>Export selected records</span>
                    </button>
                    <button class="export-menu-item" 
                            (click)="onExportAction({id: 'print', value: 'print'})">
                        <app-icon name="print" />
                        <span>Print selected records</span>
                    </button>
                </div>
            </div>
            <button class="btn btn--secondary btn--sm" type="button" (click)="resetFilter()">
                <app-icon name="refresh" />
                Reset
            </button>
        </div>
    </div>

    <!-- Error state -->
    <div *ngIf="error && !isLoading" class="error-container" style="text-align: center; padding: 40px; color: red;">
        <p>{{ error }}</p>
        <button class="btn btn--primary" (click)="loadVisitors()">Retry</button>
    </div>

    <!-- Visitors table -->
    <div class="listing-wrapper">
        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th class="checkbox-column">
                            <input
                                type="checkbox"
                                [checked]="isAllSelected()"
                                [indeterminate]="isIndeterminate()"
                                (change)="toggleSelectAll($event)"
                                (click)="$event.stopPropagation()">
                        </th>
                        <th>Id</th>
                        <th>Name</th>
                        <th>Contact</th>
                        <th>Date</th>
                        <th>Valid Upto</th>
                        <th>Purpose To Visit</th>
                        <th>Sewa Interest</th>
                        <th class="action-column">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <ng-container *ngIf="!isLoading">
                        <tr *ngFor="let visitor of pagedVisitors; trackBy: trackById" (click)="$event.stopPropagation()">
                            <td class="checkbox-column" (click)="$event.stopPropagation()">
                                <input
                                    type="checkbox"
                                    [checked]="selectedVisitors.has(visitor.id)"
                                    (change)="toggleSelectVisitor(visitor.id, $event)">
                            </td>
                            <td data-label="Id">
                                {{ visitor.id }}
                            </td>
                            <td data-label="Name" class="name-with-image">
                                <div class="visitor-image">
                                    <img [src]="visitor.image || '/assets/img/placeholder.svg'"
                                        [alt]="visitor.name"
                                        onerror="this.src='/assets/img/placeholder.svg'">
                                </div>
                                <span>{{ visitor.name }}</span>
                            </td>
                            <td data-label="Contact" class="contact-column">
                                <div class="contact-info">
                                    <div class="contact-email" *ngIf="visitor.email">{{ visitor.email }}</div>
                                    <div class="contact-phone" *ngIf="visitor.phone">{{ visitor.phone }}</div>
                                </div>
                            </td>
                            <td data-label="Date" class="date">
                                {{ formatDateTime(visitor.date) }}
                            </td>
                            <td data-label="Valid Upto" class="date">
                                {{ formatDateTime(visitor.validUpto) }}
                            </td>
                            <td data-label="Purpose To Visit" class="purpose">
                                {{ visitor.purposeToVisit }}
                            </td>
                            <td data-label="Sewa Interest" (click)="$event.stopPropagation()">
                                <span class="toggle-switch">
                                    <input 
                                        type="checkbox" 
                                        [checked]="visitor.sewaInterest"
                                        (change)="toggleSewaInterest(visitor, $event)" />
                                    <span class="toggle-slider"></span>
                                </span>
                            </td>
                            <td data-label="Action" class="action-column" (click)="$event.stopPropagation()">
                                <app-menu-dropdown
                                    [options]="getActionOptions(visitor)"
                                    (selectionChange)="onAction(visitor, $event)">
                                </app-menu-dropdown>
                            </td>
                        </tr>
                        <!-- Empty state -->
                        <tr *ngIf="pagedVisitors.length === 0">
                            <td [attr.colspan]="9" class="empty-state-cell">
                                <app-empty-state
                                    [title]="searchTerm || selectedGender.length > 0 ? 'No Results Found' : 'No Visitors Found'"
                                    [description]="searchTerm || selectedGender.length > 0 ? 'No visitors match your search criteria.' : 'There are no visitors available at the moment.'"
                                    [size]="'small'">
                                </app-empty-state>
                            </td>
                        </tr>
                    </ng-container>
                    <!-- Loading cell -->
                    <tr *ngIf="isLoading">
                        <td [attr.colspan]="9" class="loading-cell">
                            <app-loading [size]="'medium'" [type]="'spinner'"></app-loading>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <app-pager
            *ngIf="!error"
            [total]="totalItems"
            [pageSize]="pageSize"
            [currentPage]="currentPage"
            [pageSizeOptions]="pageSizeOptions"
            (pageChange)="onPageChange($event)"
            (pageSizeChange)="onPageSizeChange($event)">
        </app-pager>
    </div>

    <!-- Create Visitor Side Panel -->
    <app-side-panel
        *ngIf="createVisitorModalOpen"
        [isOpen]="createVisitorModalOpen"
        title="Create Visitor"
        [width]="500"
        position="right"
        [closable]="true"
        [showBackdrop]="true"
        [closeOnBackdropClick]="false"
        [showFooter]="true"
        [footerAlign]="'right'"
        [footerButtons]="createVisitorFooterButtons"
        (close)="closeCreateVisitorModal()"
        (footerAction)="onFooterAction($event)">
        
        <app-create-visitor
            [hideBreadcrumbs]="true"
            [hideFormActions]="true"
            (visitorCreated)="onVisitorCreated()"
            #createVisitorComponent>
        </app-create-visitor>
    </app-side-panel>
</div>

<div class="forgot-container">
  <div class="forgot-card">
    <div class="brand">
      <h1>Forgot Password</h1>
      <p>Enter your email to receive reset instructions</p>
    </div>
    
    <div *ngIf="!isSubmitted; else submittedTemplate">
      <form (ngSubmit)="onSubmit()" #forgotForm="ngForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            [(ngModel)]="email" 
            required 
            email
            #emailField="ngModel"
            class="form-control"
            [class.error]="emailField.invalid && emailField.touched"
            placeholder="Enter your email address"
          />
          <div class="error-message" *ngIf="emailField.invalid && emailField.touched">
            <span *ngIf="emailField.errors?.['required']">Email is required</span>
            <span *ngIf="emailField.errors?.['email']">Please enter a valid email</span>
          </div>
        </div>

        <button 
          type="submit" 
          class="btn-primary"
          [disabled]="forgotForm.invalid"
        >
          Send Reset Instructions
        </button>

        <div class="links">
          <a routerLink="/login" class="link">Back to Sign In</a>
        </div>
      </form>
    </div>

    <ng-template #submittedTemplate>
      <div class="success-message">
        <div class="success-icon">✓</div>
        <h3>Check Your Email</h3>
        <p>We've sent password reset instructions to <strong>{{ email }}</strong></p>
        <p class="note">Didn't receive the email? Check your spam folder or try again.</p>
        
        <div class="actions">
          <button class="btn-secondary" (click)="isSubmitted = false">
            Try Different Email
          </button>
          <a routerLink="/login" class="btn-primary">Back to Sign In</a>
        </div>
      </div>
    </ng-template>
  </div>
</div>

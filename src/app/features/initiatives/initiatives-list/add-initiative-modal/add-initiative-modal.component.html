<app-modal
    [isOpen]="isOpen"
    [title]="'Add New Initiative'"
    [size]="'small'"
    [closable]="true"
    [showHeader]="true"
    (close)="onClose()">
    
    <form class="add-initiative-form" (ngSubmit)="onSubmit()">
        <!-- Initiative Name Field -->
        <div class="form-group">
            <label class="form-label" for="initiative-name">
                Initiative Name <span class="required">*</span>
            </label>
            <input
                id="initiative-name"
                type="text"
                class="form-control"
                [(ngModel)]="name"
                [ngModelOptions]="{ standalone: true }"
                placeholder="Enter initiative name"
                required
                autofocus>
        </div>

        <!-- Status Dropdown -->
        <div class="form-group">
            <label class="form-label" for="initiative-status">
                Status
            </label>
            <app-dropdown
                [options]="statusOptions"
                [selectedValues]="[status]"
                [closeOnSelect]="true"
                placeholder="Select Status"
                (selectionChange)="onStatusChange($event)">
            </app-dropdown>
        </div>

        <!-- Form Footer -->
        <div class="form-footer">
            <button type="button" class="btn btn--secondary btn--md" (click)="onClose()">
                Cancel
            </button>
            <button type="submit" class="btn btn--primary btn--md" [disabled]="!name.trim()">
                Submit
            </button>
        </div>
    </form>
</app-modal>

<div class="initiatives-container">
    <div class="initiatives-header">
        <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
    </div>

    <!-- Filter Section -->
    <div class="listing-search">
        <div class="listing-search-item">
            <input
                type="search"
                class="form-control"
                placeholder="Search by Name"
                [(ngModel)]="searchTerm"
                [ngModelOptions]="{ standalone: true }"
                (input)="applyFilters()"/>
        </div>
    </div>

    <!-- Initiatives table -->
    <div class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th class="checkbox-column">
                        <input
                            type="checkbox"
                            [checked]="isAllSelected()"
                            [indeterminate]="isIndeterminate()"
                            (change)="toggleSelectAll($event)"
                            (click)="$event.stopPropagation()">
                    </th>
                    <th>Action</th>
                    <th (click)="sortBy('name')" class="sortable">
                        Name
                        <span class="material-icons sort-icon">{{ getSortIcon('name') }}</span>
                    </th>
                    <th (click)="sortBy('createdAt')" class="sortable">
                        Created At
                        <span class="material-icons sort-icon">{{ getSortIcon('createdAt') }}</span>
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let initiative of pagedInitiatives; trackBy: trackById" (click)="$event.stopPropagation()">
                    <td class="checkbox-column" (click)="$event.stopPropagation()">
                        <input
                            type="checkbox"
                            [checked]="selectedInitiatives.has(initiative.id)"
                            (change)="toggleSelectInitiative(initiative.id, $event)">
                    </td>
                    <td data-label="Action" (click)="$event.stopPropagation()">
                        <app-menu-dropdown
                            [options]="getActionOptions(initiative)"
                            (selectionChange)="onAction(initiative, $event)">
                        </app-menu-dropdown>
                    </td>
                    <td data-label="Name" class="name">
                        {{ initiative.name }}
                    </td>
                    <td data-label="Created At" class="date">
                        {{ initiative.createdAt }}
                    </td>
                </tr>
                <tr *ngIf="pagedInitiatives.length === 0">
                    <td [attr.colspan]="4" class="no-data">No data available in table</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <app-pager
        [total]="totalItems"
        [pageSize]="pageSize"
        [currentPage]="currentPage"
        [pageSizeOptions]="pageSizeOptions"
        (pageChange)="onPageChange($event)"
        (pageSizeChange)="onPageSizeChange($event)">
    </app-pager>

    <!-- Empty state -->
    <app-empty-state
        *ngIf="initiatives.length === 0 && !searchTerm"
        title="No Initiatives Found"
        message="There are no initiatives available at the moment.">
    </app-empty-state>
</div>

<div class="initiatives-container">
    <div class="initiatives-header">
        <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
    </div>

    <!-- Filter Section -->
    <div class="listing-search">
        <input
            type="search"
            class="form-control"
            placeholder="Search by Name"
            [(ngModel)]="searchTerm"
            [ngModelOptions]="{ standalone: true }"
            (input)="applyFilters()"
        />
        <div class="listing-search-item">
            <app-dropdown
                [options]="branchSearchTypeOptions"
                [selectedValues]="branchSearchType ? [branchSearchType] : []"
                [closeOnSelect]="true"
                placeholder="Branch Search Type"
                (selectionChange)="onBranchSearchTypeChange($event)">
            </app-dropdown>
            <app-dropdown
                [options]="correspondingBranchOptions"
                [selectedValues]="correspondingBranch ? [correspondingBranch] : []"
                [closeOnSelect]="true"
                placeholder="Corresponding Branch"
                (selectionChange)="onCorrespondingBranchChange($event)">
            </app-dropdown>
            <app-dropdown
                [options]="taskBranchOptions"
                [selectedValues]="taskBranch ? [taskBranch] : []"
                [closeOnSelect]="true"
                placeholder="Task Branch"
                (selectionChange)="onTaskBranchChange($event)">
            </app-dropdown>
            <button class="btn btn--primary btn--sm" type="button" (click)="openAddModal()">
                Add New
            </button>
        </div>
    </div>

    <!-- Initiatives table -->
    <div class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th class="checkbox-column">
                        <input
                            type="checkbox"
                            [checked]="isAllSelected()"
                            [indeterminate]="isIndeterminate()"
                            (change)="toggleSelectAll($event)"
                            (click)="$event.stopPropagation()"
                        />
                    </th>
                    <th (click)="sortBy('name')" class="sortable">
                        Name
                        <app-icon [name]="getSortIcon('name')" class="sort-icon" />
                    </th>
                    <th (click)="sortBy('createdAt')" class="sortable">
                        Created At
                        <app-icon [name]="getSortIcon('createdAt')" class="sort-icon" />
                    </th>
                    <th class="action-column">Action</th>
                </tr>
            </thead>
            <tbody>
                <ng-container *ngIf="!isLoading">
                    <tr *ngFor="let initiative of pagedInitiatives; trackBy: trackById" (click)="$event.stopPropagation()">
                        <td class="checkbox-column" (click)="$event.stopPropagation()">
                            <input
                                type="checkbox"
                                [checked]="selectedInitiatives.has(initiative.id)"
                                (change)="toggleSelectInitiative(initiative.id, $event)">
                        </td>
                        <td data-label="Name" class="name">
                            {{ initiative.name }}
                        </td>
                        <td data-label="Created At" class="date">
                            {{ initiative.createdAt }}
                        </td>
                        <td data-label="Action" class="action-column" (click)="$event.stopPropagation()">
                            <app-menu-dropdown
                                [options]="getActionOptions(initiative)"
                                (selectionChange)="onAction(initiative, $event)">
                            </app-menu-dropdown>
                        </td>
                    </tr>
                    <!-- Empty state -->
                    <tr *ngIf="pagedInitiatives.length === 0">
                        <td [attr.colspan]="4" class="empty-state-cell">
                            <app-empty-state
                                [title]="searchTerm ? 'No Results Found' : 'No Initiatives Found'"
                                [description]="searchTerm ? 'No initiatives match your search criteria.' : 'There are no initiatives available at the moment.'"
                                [size]="'small'">
                            </app-empty-state>
                        </td>
                    </tr>
                </ng-container>
                <!-- Loading cell -->
                <tr *ngIf="isLoading">
                    <td [attr.colspan]="4" class="loading-cell">
                        <app-loading [size]="'medium'" [type]="'spinner'"></app-loading>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <app-pager
        [total]="totalItems"
        [pageSize]="pageSize"
        [currentPage]="currentPage"
        [pageSizeOptions]="pageSizeOptions"
        (pageChange)="onPageChange($event)"
        (pageSizeChange)="onPageSizeChange($event)">
    </app-pager>

    <!-- Add New Initiative Modal - Only render when needed -->
    <app-add-initiative-modal
        *ngIf="isAddModalOpen"
        [isOpen]="isAddModalOpen"
        (close)="closeAddModal()"
        (submit)="onAddInitiativeSubmit($event)">
    </app-add-initiative-modal>
</div>

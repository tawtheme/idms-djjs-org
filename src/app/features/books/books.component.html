<div class="books-container">
    <div class="books-header">
        <h2>Books</h2>
        <div class="books-actions"></div>
    </div>

    <div class="table-container">
        <div class="table-header">
            <div class="table-header-row">
                <div class="table-cell header-cell">Title</div>
                <div class="table-cell header-cell">ISBN</div>
                <div class="table-cell header-cell">Trim</div>
                <div class="table-cell header-cell">Pages</div>
            </div>
        </div>

        <div class="books-rows">
            <div class="table-row" *ngFor="let b of [
        {title:'Book A', isbn:'978000000001', trim:'6x9', pages:300},
        {title:'Book B', isbn:'978000000002', trim:'5x8', pages:220}
      ]">
                <div class="table-cell title">{{ b.title }}</div>
                <div class="table-cell isbn">{{ b.isbn }}</div>
                <div class="table-cell trim">{{ b.trim }}</div>
                <div class="table-cell pages">{{ b.pages }}</div>
            </div>
        </div>
    </div>
</div>

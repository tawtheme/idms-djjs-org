<app-modal
    [isOpen]="isOpen"
    [title]="modalTitle"
    [size]="'small'"
    [closable]="true"
    [showHeader]="true"
    (close)="onClose()">

    <form class="add-master-entry-form" (ngSubmit)="onSubmit()">
        <!-- Name Field (generic, hidden for banks where we show a custom layout) -->
        <div class="form-group" *ngIf="masterType !== 'banks'">
            <label class="form-label" [for]="'name-' + masterType">
                {{ nameFieldLabel }} <span class="required">*</span>
            </label>
            <input
                [id]="'name-' + masterType"
                type="text"
                class="form-control"
                [(ngModel)]="name"
                [ngModelOptions]="{ standalone: true }"
                placeholder="Enter {{ nameFieldLabel.toLowerCase() }}"
                required
                autofocus>
        </div>

        <!-- Bank specific fields (only for Banks master) -->
        <ng-container *ngIf="masterType === 'banks'">
            <div class="form-group">
                <label class="form-label" for="bank-name">
                    Bank <span class="required">*</span>
                </label>
                <input
                    id="bank-name"
                    type="text"
                    class="form-control"
                    [(ngModel)]="name"
                    [ngModelOptions]="{ standalone: true }"
                    placeholder="Enter bank name"
                    required
                    autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="bank-branch">
                    Branch
                </label>
                <input
                    id="bank-branch"
                    type="text"
                    class="form-control"
                    [(ngModel)]="branch"
                    [ngModelOptions]="{ standalone: true }"
                    placeholder="Enter branch">
            </div>

            <div class="form-group">
                <label class="form-label" for="bank-ifsc">
                    IFSC Code
                </label>
                <input
                    id="bank-ifsc"
                    type="text"
                    class="form-control"
                    [(ngModel)]="ifsc_code"
                    [ngModelOptions]="{ standalone: true }"
                    placeholder="Enter IFSC code">
            </div>

            <div class="form-group">
                <label class="form-label" for="bank-address">
                    Address
                </label>
                <input
                    id="bank-address"
                    type="text"
                    class="form-control"
                    [(ngModel)]="address"
                    [ngModelOptions]="{ standalone: true }"
                    placeholder="Enter address">
            </div>

            <div class="form-group">
                <label class="form-label" for="bank-country">
                    Country
                </label>
                <app-dropdown
                    [options]="countryOptions"
                    [selectedValues]="selectedCountryId ? [selectedCountryId] : []"
                    [closeOnSelect]="true"
                    placeholder="Select country"
                    (selectionChange)="onCountryChange($event)">
                </app-dropdown>
            </div>

            <div class="form-group">
                <label class="form-label" for="bank-state">
                    State
                </label>
                <app-dropdown
                    [options]="stateOptions"
                    [selectedValues]="selectedStateId ? [selectedStateId] : []"
                    [closeOnSelect]="true"
                    placeholder="Select state"
                    (selectionChange)="onStateChange($event)">
                </app-dropdown>
            </div>

            <div class="form-group">
                <label class="form-label" for="bank-city">
                    City
                </label>
                <app-dropdown
                    [options]="cityOptions"
                    [selectedValues]="selectedCityId ? [selectedCityId] : []"
                    [closeOnSelect]="true"
                    placeholder="Select city"
                    (selectionChange)="onCityChange($event)">
                </app-dropdown>
            </div>

            <div class="form-group">
                <label class="form-label" for="bank-phone-primary">
                    Phone primary
                </label>
                <input
                    id="bank-phone-primary"
                    type="text"
                    class="form-control"
                    [(ngModel)]="phone_primary"
                    [ngModelOptions]="{ standalone: true }"
                    placeholder="Enter primary phone">
            </div>

            <div class="form-group">
                <label class="form-label" for="bank-phone-secondary">
                    Phone secondary
                </label>
                <input
                    id="bank-phone-secondary"
                    type="text"
                    class="form-control"
                    [(ngModel)]="phone_secondary"
                    [ngModelOptions]="{ standalone: true }"
                    placeholder="Enter secondary phone">
            </div>

            <div class="form-group">
                <label class="form-label" for="bank-remarks">
                    Remarks
                </label>
                <input
                    id="bank-remarks"
                    type="text"
                    class="form-control"
                    [(ngModel)]="remarks"
                    [ngModelOptions]="{ standalone: true }"
                    placeholder="Enter remarks">
            </div>
        </ng-container>

        <!-- Status Dropdown -->
        <div class="form-group">
            <label class="form-label">
                Status
            </label>
            <app-dropdown
                [options]="statusOptions"
                [selectedValues]="[status]"
                [closeOnSelect]="true"
                placeholder="Select Status"
                (selectionChange)="onStatusChange($event)">
            </app-dropdown>
        </div>

        <!-- Form Footer -->
        <div class="form-footer">
            <button type="button" class="btn btn--secondary btn--md" (click)="onClose()">
                Cancel
            </button>
            <button type="submit" class="btn btn--primary btn--md" [disabled]="!name.trim()">
                Submit
            </button>
        </div>
    </form>
</app-modal>

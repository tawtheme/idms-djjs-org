<app-modal
    [isOpen]="isOpen"
    [title]="modalTitle"
    [size]="'medium'"
    [closable]="true"
    [showHeader]="true"
    (close)="onClose()">
    
    <form class="add-master-entry-form" (ngSubmit)="onSubmit()">
        <!-- Name Field -->
        <div class="form-group">
            <label class="form-label" [for]="'name-' + masterType">
                {{ nameFieldLabel }} <span class="required">*</span>
            </label>
            <input
                [id]="'name-' + masterType"
                type="text"
                class="form-control"
                [(ngModel)]="name"
                [ngModelOptions]="{ standalone: true }"
                placeholder="Enter {{ nameFieldLabel.toLowerCase() }}"
                required
                autofocus>
        </div>

        <!-- Status Dropdown -->
        <div class="form-group">
            <label class="form-label">
                Status
            </label>
            <app-dropdown
                [options]="statusOptions"
                [selectedValues]="[status]"
                [closeOnSelect]="true"
                placeholder="Select Status"
                (selectionChange)="onStatusChange($event)">
            </app-dropdown>
        </div>

        <!-- Form Footer -->
        <div class="form-footer">
            <button type="button" class="btn btn--secondary btn--md" (click)="onClose()">
                Cancel
            </button>
            <button type="submit" class="btn btn--primary btn--md" [disabled]="!name.trim()">
                Submit
            </button>
        </div>
    </form>
</app-modal>

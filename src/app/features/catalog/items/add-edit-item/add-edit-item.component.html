<div class="add-edit-item-container">
    <form (ngSubmit)="save()" #f="ngForm">
        <div class="panel-card">
            <div class="form-grid cols-1">
                <label>
                    <span>Item ID</span>
                    <input 
                        name="item_id" 
                        [(ngModel)]="itemData.item_id" 
                        required 
                        class="form-control" 
                        placeholder="Auto-generated" 
                        [disabled]="isEditMode" />
                </label>
                <label>
                    <span>Item Name <span class="required">*</span></span>
                    <input 
                        name="item_name" 
                        [(ngModel)]="itemData.item_name" 
                        required 
                        class="form-control" 
                        placeholder="Enter item name" />
                </label>
            </div>
            <div class="form-grid cols-1">
                <label>
                    <span>Description</span>
                    <textarea 
                        name="description" 
                        [(ngModel)]="itemData.description" 
                        class="form-control" 
                        rows="3"
                        placeholder="Enter item description"></textarea>
                </label>
            </div>
            <div class="form-grid cols-3">
                <label>
                    <span>Unit of Measure <span class="required">*</span></span>
                    <app-dropdown
                        [options]="unitOfMeasureOptions"
                        [selectedValues]="getSelectedValues(itemData.unit_of_measure)"
                        (selectionChange)="onDropdownChange('unit_of_measure', $event)"
                        placeholder="Select unit of measure"
                        [closeOnSelect]="true"
                        required>
                    </app-dropdown>
                </label>
                <label>
                    <span>Unit Price</span>
                    <input 
                        type="number" 
                        name="unit_price" 
                        [(ngModel)]="itemData.unit_price" 
                        min="0"
                        step="0.01"
                        class="form-control" 
                        placeholder="0.00" />
                </label>
                <label>
                    <span>Tax Percentage (%)</span>
                    <input 
                        type="number" 
                        name="tax_percent" 
                        [(ngModel)]="itemData.tax_percent" 
                        min="0"
                        max="100"
                        step="0.01"
                        class="form-control" 
                        placeholder="0.00" />
                </label>
            </div>
            <div class="form-grid cols-2">
                <button type="button" class="btn btn--secondary btn--md" (click)="cancel()">Cancel</button>
                 <button type="submit" class="btn btn--primary btn--md" [disabled]="!isFormValid()">
                     <span *ngIf="!submitting">{{ isEditMode ? 'Update Item' : 'Create Item' }}</span>
                     <span *ngIf="submitting">{{ isEditMode ? 'Updating...' : 'Submit' }}</span>
                 </button>
            </div>
        </div>
    </form>

    <!-- Snackbar for error messages -->
    <app-snackbar *ngIf="snackbarConfig" [config]="snackbarConfig"></app-snackbar>
</div>

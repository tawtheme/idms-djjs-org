<div class="add-order-container">
    <form (ngSubmit)="save()" class="side-panel-form">
        <!-- Section: Basic Information -->
        <div class="panel-card">
            <div class="form-grid cols-2">
                <label>
                    <span>Order ID</span>
                    <input 
                        name="id" 
                        [(ngModel)]="order.id" 
                        required 
                        class="form-control" 
                        placeholder="Auto-generated" 
                        [disabled]="true" />
                </label>
                <label>
                    <span>Order Source <span class="required">*</span></span>
                    <app-dropdown
                        [options]="sourceOptions"
                        [selectedValues]="getSelectedValues(order.source)"
                        (selectionChange)="onDropdownChange('source', $event)"
                        placeholder="Select source"
                        [closeOnSelect]="true"
                        required>
                    </app-dropdown>
                </label>
                <label>
                    <span>Order Date <span class="required">*</span></span>
                    <app-datepicker
                        [value]="getOrderDate()"
                        (dateChange)="onDateChange('orderDate', $event)"
                        format="yyyy-MM-dd"
                        placeholder="Select order date"
                        required>
                    </app-datepicker>
                </label>
                <label>
                    <span>Due Date</span>
                    <app-datepicker
                        [value]="getDueDate()"
                        (dateChange)="onDateChange('dueDate', $event)"
                        format="yyyy-MM-dd"
                        placeholder="Select due date">
                    </app-datepicker>
                </label>
            </div>
        </div>

        <!-- Section: Items -->
        <div class="panel-card">
            <app-add-item
                [items]="order.items"
                (itemsChange)="onItemsChange($event)">
            </app-add-item>
        </div>

        <!-- Section: Shipping Address -->
        <div class="panel-card">
            <span class="panel-card-row-title">
                Shipping Address
                <span class="description">Enter the shipping address for the order.</span>
            </span>
            <div class="form-grid cols-1">
                <label>
                    <span>Address Line 1</span>
                    <input 
                        name="shipping_addressLine1" 
                        [(ngModel)]="order.shippingAddress.addressLine1" 
                        class="form-control" 
                        placeholder="Enter address line 1" />
                </label>
                <label>
                    <span>Address Line 2</span>
                    <input 
                        name="shipping_addressLine2" 
                        [(ngModel)]="order.shippingAddress.addressLine2" 
                        class="form-control" 
                        placeholder="Enter address line 2" />
                </label>
            </div>
            <div class="form-grid cols-2">
                <label>
                    <span>City</span>
                    <input 
                        name="shipping_city" 
                        [(ngModel)]="order.shippingAddress.city" 
                        class="form-control" 
                        placeholder="Enter city" />
                </label>
                <label>
                    <span>State</span>
                    <input 
                        name="shipping_state" 
                        [(ngModel)]="order.shippingAddress.state" 
                        class="form-control" 
                        placeholder="Enter state" />
                </label>
                <label>
                    <span>Postal Code</span>
                    <input 
                        name="shipping_postalCode" 
                        [(ngModel)]="order.shippingAddress.postalCode" 
                        class="form-control" 
                        placeholder="Enter postal code" />
                </label>
                <label>
                    <span>Country</span>
                    <input 
                        name="shipping_country" 
                        [(ngModel)]="order.shippingAddress.country" 
                        class="form-control" 
                        placeholder="Enter country" />
                </label>
            </div>

            <div class="form-grid cols-1">
                <label>
                    <span>Notes</span>
                    <textarea 
                        name="notes" 
                        [(ngModel)]="order.notes" 
                        class="form-control" 
                        rows="3"
                        placeholder="Enter any additional notes about this order"></textarea>
                </label>
            </div>

            <div class="form-grid cols-2">
                <button type="button" class="btn btn--secondary btn--md" (click)="cancel()">Cancel</button>
                <button type="submit" class="btn btn--primary btn--md" [disabled]="!isFormValid()">
                    <span *ngIf="!submitting">Create Order</span>
                    <span *ngIf="submitting">Creating...</span>
                </button>
            </div>
        </div>
    </form>

    <!-- Snackbar for error messages -->
    <app-snackbar *ngIf="snackbarConfig" [config]="snackbarConfig"></app-snackbar>
</div>

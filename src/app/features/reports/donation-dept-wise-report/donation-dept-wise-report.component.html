<div class="reports-container">
    <!-- Search & Filter Panel -->
    <div class="search-panel">
        <div class="filters-grid filters-grid--four">
            <div class="filter-field">
                <label>Task Branch</label>
                <app-dropdown
                    [options]="taskBranchOptions"
                    [selectedValues]="selectedTaskBranch"
                    placeholder="None"
                    [searchable]="true"
                    [autocomplete]="true"
                    [closeOnSelect]="true"
                    (selectionChange)="onTaskBranchChange($event)">
                </app-dropdown>
            </div>
            <div class="filter-field">
                <label>Programs</label>
                <app-dropdown
                    [options]="programOptions"
                    [selectedValues]="selectedProgram"
                    placeholder=""
                    [searchable]="true"
                    [autocomplete]="true"
                    [closeOnSelect]="true"
                    (selectionChange)="selectedProgram = $event">
                </app-dropdown>
            </div>
            <div class="filter-field filter-field--actions">
                <label>&nbsp;</label>
                <div class="filter-actions">
                    <button class="btn btn--primary btn--md" type="button" [disabled]="isLoading" (click)="applyFilter()">
                        {{ isLoading ? 'Searching...' : 'Search' }}
                    </button>
                    <button class="btn btn--outline btn--md" type="button" [disabled]="isExporting" (click)="exportReport('web')">
                        {{ isExporting ? 'Exporting...' : 'Export' }}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Error state -->
    <div *ngIf="error && !isLoading" class="error-state">
        <p>{{ error }}</p>
        <button class="btn btn--primary btn--sm" (click)="loadReport()">Retry</button>
    </div>

        <ng-container *ngIf="!error">
            <!-- Reports Table -->
            <div class="listing-wrapper">
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th class="sortable" (click)="sortBy('sewaName')">
                                    <span class="th-content">
                                        Sewa Name
                                        <app-icon
                                            [name]="sortField === 'sewaName' && sortDirection === 'asc' ? 'arrow_upward' : sortField === 'sewaName' && sortDirection === 'desc' ? 'arrow_downward' : 'unfold_more'"
                                            class="sort-icon"
                                            [class.sort-icon--active]="sortField === 'sewaName'" />
                                    </span>
                                </th>
                                <th class="sortable text-right" (click)="sortBy('donationAmount')">
                                    <span class="th-content th-content--right">
                                        Donation Amount
                                        <app-icon
                                            [name]="sortField === 'donationAmount' && sortDirection === 'asc' ? 'arrow_upward' : sortField === 'donationAmount' && sortDirection === 'desc' ? 'arrow_downward' : 'unfold_more'"
                                            class="sort-icon"
                                            [class.sort-icon--active]="sortField === 'donationAmount'" />
                                    </span>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let row of rows; trackBy: trackById">
                                <td data-label="Sewa Name">{{ row.sewaName }}</td>
                                <td data-label="Donation Amount" class="text-right">{{ formatCurrency(row.donationAmount) }}</td>
                            </tr>
                            <tr *ngIf="rows.length === 0" class="empty-row">
                                <td colspan="2">
                                    <app-empty-state
                                        title="No data available in table"
                                        description="There are no donations matching the selected filters."
                                        [size]="'small'">
                                    </app-empty-state>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="total-bar">
                    <span class="total-bar__label">Total Donation:</span>
                    <span class="total-bar__value">{{ formatCurrency(totalDonation) }}</span>
                </div>

                <!-- Pagination -->
                <app-pager
                    [total]="totalItems"
                    [pageSize]="pageSize"
                    [currentPage]="currentPage"
                    [pageSizeOptions]="pageSizeOptions"
                    (pageChange)="onPageChange($event)"
                    (pageSizeChange)="onPageSizeChange($event)">
                </app-pager>
            </div>
        </ng-container>
</div>

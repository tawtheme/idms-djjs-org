<div class="dashboard-container">
    <div class="dashboard-loading" *ngIf="isLoading">
        <app-loading [size]="'large'" [type]="'spinner'" [message]="'Loading dashboard...'"></app-loading>
    </div>

    <ng-container *ngIf="!isLoading">
    <!-- Donation Amounts Section -->
    <div class="donation-section">
        <div class="donation-card">
            <div class="donation-label">Total Donation Amount</div>
            <div class="donation-value">{{ totalDonation || '—' }}</div>
        </div>
        <div class="donation-card">
            <div class="donation-label">Latest Month Donation Amount</div>
            <div class="donation-value">{{ latestMonthDonation || '—' }}</div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="dashboard-content">
        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card" *ngFor="let stat of stats" [class]="'stat-card--' + stat.iconColor">
                <div class="stat-icon" [class]="'stat-icon--' + stat.iconColor">
                    <app-icon [name]="stat.icon" />
                </div>
                <div class="stat-content">
                    <div class="stat-title">{{ stat.title }}</div>
                    <div class="stat-value">{{ formatNumber(stat.value) }}</div>
                </div>
            </div>
        </div>

        <!-- Upcoming Programs Section -->
        <div class="programs-section">
            <div class="programs-header">
                <h2 class="programs-title">Upcoming Programs</h2>
                <a class="btn-view-all" routerLink="/programs">View All</a>
            </div>
            <div class="programs-content">
                <div class="programs-empty" *ngIf="!upcomingPrograms.length">
                    <p>No upcoming programs</p>
                </div>
            </div>
        </div>
    </div>
    </ng-container>
</div>

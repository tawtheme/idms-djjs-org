<div class="page-container">
    <div class="page-header">
        <h2 class="page-title">Add New Branch</h2>
        <p class="page-subtitle">Fill in the details below to create a new branch</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="branch-form">
        <!-- Branch Information -->
        <div class="form-section">
            <div class="section-header">
                <h3 class="section-title">Branch Information</h3>
            </div>
            <div class="form-grid">
                <div class="form-field">
                    <label for="branch-name">Name <span class="required">*</span></label>
                    <input id="branch-name" type="text" class="form-control" [(ngModel)]="name" [ngModelOptions]="{ standalone: true }" placeholder="Enter name" required>
                </div>
                <div class="form-field">
                    <label for="branch-code">Branch Code</label>
                    <input id="branch-code" type="text" class="form-control" [(ngModel)]="code" [ngModelOptions]="{ standalone: true }" placeholder="Enter branch code">
                </div>
                <div class="form-field">
                    <label for="parent-branch">Parent Branch</label>
                    <app-dropdown [options]="parentBranchOptions" [selectedValues]="parentBranch ? [parentBranch] : []" [searchable]="true" [closeOnSelect]="true" placeholder="Select Parent Branch" (selectionChange)="onParentBranchChange($event)"></app-dropdown>
                </div>
                <div class="form-field">
                    <label for="branch-head">Branch Head <span class="required">*</span></label>
                    <app-dropdown [options]="branchHeadOptions" [selectedValues]="branchHead ? [branchHead] : []" [searchable]="true" [closeOnSelect]="true" placeholder="Select Branch Head" (selectionChange)="onBranchHeadChange($event)"></app-dropdown>
                </div>
                <div class="form-field">
                    <label for="can-be-parent-branch">Can be a Parent Branch</label>
                    <app-dropdown [options]="canBeParentBranchOptions" [selectedValues]="[canBeParentBranch]" [closeOnSelect]="true" placeholder="Select" (selectionChange)="onCanBeParentBranchChange($event)"></app-dropdown>
                </div>
                <div class="form-field">
                    <label for="status">Status</label>
                    <app-dropdown [options]="statusOptions" [selectedValues]="[status]" [closeOnSelect]="true" placeholder="Select Status" (selectionChange)="onStatusChange($event)"></app-dropdown>
                </div>
            </div>
        </div>

        <!-- Contact Details -->
        <div class="form-section">
            <div class="section-header">
                <h3 class="section-title">Contact Details</h3>
            </div>
            <div class="form-grid">
                <div class="form-field">
                    <label for="email">Email <span class="required">*</span></label>
                    <input id="email" type="email" class="form-control" [(ngModel)]="email" [ngModelOptions]="{ standalone: true }" placeholder="Enter email" required>
                </div>
            </div>
        </div>

        <!-- Address -->
        <div class="form-section">
            <div class="section-header">
                <h3 class="section-title">Address</h3>
            </div>
            <div class="form-grid">
                <div class="form-field form-field--full">
                    <label for="address">Address <span class="required">*</span></label>
                    <input id="address" type="text" class="form-control" [(ngModel)]="address" [ngModelOptions]="{ standalone: true }" placeholder="Enter address" required>
                </div>
                <div class="form-field">
                    <label for="country">Country <span class="required">*</span></label>
                    <app-dropdown [options]="countryOptions" [selectedValues]="country ? [country] : []" [searchable]="true" [closeOnSelect]="true" placeholder="Select Country" (selectionChange)="onCountryChange($event)"></app-dropdown>
                </div>
                <div class="form-field">
                    <label for="state">State <span class="required">*</span></label>
                    <input id="state" type="text" class="form-control" [(ngModel)]="state" [ngModelOptions]="{ standalone: true }" placeholder="Enter state" required>
                </div>
                <div class="form-field">
                    <label for="city">City <span class="required">*</span></label>
                    <input id="city" type="text" class="form-control" [(ngModel)]="city" [ngModelOptions]="{ standalone: true }" placeholder="Enter city" required>
                </div>
                <div class="form-field">
                    <label for="pincode">Pincode <span class="required">*</span></label>
                    <input id="pincode" type="text" class="form-control" [(ngModel)]="pincode" [ngModelOptions]="{ standalone: true }" placeholder="Enter pincode" required>
                </div>
            </div>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
            <button type="button" class="btn btn--secondary" (click)="onReset()" [disabled]="isLoading">Reset</button>
            <button type="submit" class="btn btn--primary" [disabled]="isLoading">
                {{ isLoading ? 'Submitting...' : 'Create Branch' }}
            </button>
        </div>
    </form>
</div>

<div class="branches-container">
    <div class="branches-header">
        <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
    </div>

    <!-- Filter Section -->
    <div class="listing-search">
        <app-dropdown
            [options]="branchDropdownOptions"
            [selectedValues]="selectedBranchFilter"
            placeholder="Select Branch"
            [searchable]="true"
            (selectionChange)="selectedBranchFilter = $event; applyFilters()"
            [closeOnSelect]="true">
        </app-dropdown>
        <input
            type="search"
            class="form-control"
            placeholder="Search by Name, Code, City or Type"
            [(ngModel)]="searchTerm"
            [ngModelOptions]="{ standalone: true }"
            (input)="applyFilters()"
        />
        <button class="btn btn--primary btn--sm" type="button" (click)="openAddModal()">
            Add New
        </button>
    </div>

    <!-- Branches table -->
    <div class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th class="action-column">Action</th>
                    <th (click)="sortBy('name')" class="sortable">
                        Name
                        <app-icon [name]="getSortIcon('name')" class="sort-icon" />
                    </th>
                    <th (click)="sortBy('code')" class="sortable">
                        Code
                        <app-icon [name]="getSortIcon('code')" class="sort-icon" />
                    </th>
                    <th (click)="sortBy('city')" class="sortable">
                        City
                        <app-icon [name]="getSortIcon('city')" class="sort-icon" />
                    </th>
                    <th (click)="sortBy('type')" class="sortable">
                        Type
                        <app-icon [name]="getSortIcon('type')" class="sort-icon" />
                    </th>
                    <th>Status</th>
                    <th (click)="sortBy('createdAt')" class="sortable">
                        Created At
                        <app-icon [name]="getSortIcon('createdAt')" class="sort-icon" />
                    </th>
                </tr>
            </thead>
            <tbody>
                <ng-container *ngIf="!isLoading">
                    <tr *ngFor="let branch of pagedBranches; trackBy: trackById" (click)="$event.stopPropagation()">
                        <td data-label="Action" class="action-column" (click)="$event.stopPropagation()">
                            <app-menu-dropdown
                                [options]="getActionOptions(branch)"
                                (selectionChange)="onAction(branch, $event)">
                            </app-menu-dropdown>
                        </td>
                        <td data-label="Name" class="name">
                            {{ branch.name }}
                        </td>
                        <td data-label="Code">
                            {{ branch.code }}
                        </td>
                        <td data-label="City">
                            {{ branch.city }}
                        </td>
                        <td data-label="Type">
                            {{ branch.type }}
                        </td>
                        <td data-label="Status" class="status">
                            <span class="status-badge" [ngClass]="'status-' + (branch.status | lowercase)">
                                {{ branch.status }}
                            </span>
                        </td>
                        <td data-label="Created At" class="date">
                            {{ branch.createdAt }}
                        </td>
                    </tr>
                    <!-- Empty state -->
                    <tr *ngIf="pagedBranches.length === 0">
                        <td [attr.colspan]="8" class="empty-state-cell">
                            <app-empty-state
                                [title]="searchTerm ? 'No Results Found' : 'No Branches Found'"
                                [description]="searchTerm ? 'No branches match your search criteria.' : 'There are no branches available at the moment.'"
                                [size]="'small'">
                            </app-empty-state>
                        </td>
                    </tr>
                </ng-container>
                <!-- Loading cell -->
                <tr *ngIf="isLoading">
                    <td [attr.colspan]="8" class="loading-cell">
                        <app-loading [size]="'medium'" [type]="'spinner'"></app-loading>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <app-pager
        [total]="totalItems"
        [pageSize]="pageSize"
        [currentPage]="currentPage"
        [pageSizeOptions]="pageSizeOptions"
        (pageChange)="onPageChange($event)"
        (pageSizeChange)="onPageSizeChange($event)">
    </app-pager>

    <!-- Add New Branch Sidepanel -->
    <app-add-branch-modal
        *ngIf="isAddModalOpen"
        [isOpen]="isAddModalOpen"
        (close)="closeAddModal()"
        (submit)="onAddBranchSubmit($event)">
    </app-add-branch-modal>
</div>

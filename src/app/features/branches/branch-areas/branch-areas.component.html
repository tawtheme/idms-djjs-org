<div class="branch-areas-container">
    <div class="branch-areas-header">
    </div>

    <!-- Filter Section -->
    <div class="listing-search">
        <app-dropdown
            [options]="branchDropdownOptions"
            [selectedValues]="selectedBranchFilter"
            placeholder="Select Branch"
            [searchable]="true"
            (selectionChange)="selectedBranchFilter = $event; applyFilters()"
            [closeOnSelect]="true">
        </app-dropdown>
        <input
            type="search"
            class="form-control"
            placeholder="Search by Branch Name, Area Name or City"
            [(ngModel)]="searchTerm"
            [ngModelOptions]="{ standalone: true }"
            (input)="applyFilters()"
        />
        <button class="btn btn--primary btn--sm" type="button" (click)="openAddModal()">
            Add New
        </button>
    </div>

    <!-- Branch Areas table -->
    <div class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th class="action-column">Action</th>
                    <th (click)="sortBy('branchName')" class="sortable">
                        Branch Name
                        <app-icon [name]="getSortIcon('branchName')" class="sort-icon" />
                    </th>
                    <th (click)="sortBy('areaName')" class="sortable">
                        Area Name
                        <app-icon [name]="getSortIcon('areaName')" class="sort-icon" />
                    </th>
                    <th (click)="sortBy('city')" class="sortable">
                        City
                        <app-icon [name]="getSortIcon('city')" class="sort-icon" />
                    </th>
                    <th>Status</th>
                    <th (click)="sortBy('createdAt')" class="sortable">
                        Created At
                        <app-icon [name]="getSortIcon('createdAt')" class="sort-icon" />
                    </th>
                </tr>
            </thead>
            <tbody>
                <ng-container *ngIf="!isLoading">
                    <tr *ngFor="let area of pagedBranchAreas; trackBy: trackById" (click)="$event.stopPropagation()">
                        <td data-label="Action" class="action-column" (click)="$event.stopPropagation()">
                            <app-menu-dropdown
                                [options]="getActionOptions(area)"
                                (selectionChange)="onAction(area, $event)">
                            </app-menu-dropdown>
                        </td>
                        <td data-label="Branch Name" class="name">
                            {{ area.branchName }}
                        </td>
                        <td data-label="Area Name">
                            {{ area.areaName }}
                        </td>
                        <td data-label="City">
                            {{ area.city }}
                        </td>
                        <td data-label="Status" class="status">
                            <span class="status-badge" [ngClass]="'status-' + (area.status | lowercase)">
                                {{ area.status }}
                            </span>
                        </td>
                        <td data-label="Created At" class="date">
                            {{ area.createdAt }}
                        </td>
                    </tr>
                    <!-- Empty state -->
                    <tr *ngIf="pagedBranchAreas.length === 0">
                        <td [attr.colspan]="7" class="empty-state-cell">
                            <app-empty-state
                                [title]="searchTerm ? 'No Results Found' : 'No Branch Areas Found'"
                                [description]="searchTerm ? 'No branch areas match your search criteria.' : 'There are no branch areas available at the moment.'"
                                [size]="'small'">
                            </app-empty-state>
                        </td>
                    </tr>
                </ng-container>
                <!-- Loading cell -->
                <tr *ngIf="isLoading">
                    <td [attr.colspan]="7" class="loading-cell">
                        <app-loading [size]="'medium'" [type]="'spinner'"></app-loading>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <app-pager
        [total]="totalItems"
        [pageSize]="pageSize"
        [currentPage]="currentPage"
        [pageSizeOptions]="pageSizeOptions"
        (pageChange)="onPageChange($event)"
        (pageSizeChange)="onPageSizeChange($event)">
    </app-pager>

    <!-- Add New Branch Area Modal -->
    <app-add-branch-area-modal
        *ngIf="isAddModalOpen"
        [isOpen]="isAddModalOpen"
        (close)="closeAddModal()"
        (submit)="onAddBranchAreaSubmit($event)">
    </app-add-branch-area-modal>
</div>

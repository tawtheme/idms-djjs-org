<div class="branch-areas-container">
    <div class="branch-areas-header">
        <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
    </div>

    <!-- Filter Section -->
    <div class="listing-search">
        <div class="listing-search-item">
            <input
                type="search"
                class="form-control"
                placeholder="Search by Branch Name, Area Name or City"
                [(ngModel)]="searchTerm"
                [ngModelOptions]="{ standalone: true }"
                (input)="applyFilters()"/>
        </div>
    </div>

    <!-- Branch Areas table -->
    <div class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th class="checkbox-column">
                        <input
                            type="checkbox"
                            [checked]="isAllSelected()"
                            [indeterminate]="isIndeterminate()"
                            (change)="toggleSelectAll($event)"
                            (click)="$event.stopPropagation()">
                    </th>
                    <th>Action</th>
                    <th (click)="sortBy('branchName')" class="sortable">
                        Branch Name
                        <span class="material-icons sort-icon">{{ getSortIcon('branchName') }}</span>
                    </th>
                    <th (click)="sortBy('areaName')" class="sortable">
                        Area Name
                        <span class="material-icons sort-icon">{{ getSortIcon('areaName') }}</span>
                    </th>
                    <th (click)="sortBy('city')" class="sortable">
                        City
                        <span class="material-icons sort-icon">{{ getSortIcon('city') }}</span>
                    </th>
                    <th>Status</th>
                    <th (click)="sortBy('createdAt')" class="sortable">
                        Created At
                        <span class="material-icons sort-icon">{{ getSortIcon('createdAt') }}</span>
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let area of pagedBranchAreas; trackBy: trackById" (click)="$event.stopPropagation()">
                    <td class="checkbox-column" (click)="$event.stopPropagation()">
                        <input
                            type="checkbox"
                            [checked]="selectedBranchAreas.has(area.id)"
                            (change)="toggleSelectBranchArea(area.id, $event)">
                    </td>
                    <td data-label="Action" (click)="$event.stopPropagation()">
                        <app-menu-dropdown
                            [options]="getActionOptions(area)"
                            (selectionChange)="onAction(area, $event)">
                        </app-menu-dropdown>
                    </td>
                    <td data-label="Branch Name" class="name">
                        {{ area.branchName }}
                    </td>
                    <td data-label="Area Name">
                        {{ area.areaName }}
                    </td>
                    <td data-label="City">
                        {{ area.city }}
                    </td>
                    <td data-label="Status" class="status">
                        <span class="status-badge" [ngClass]="'status-' + (area.status | lowercase)">
                            {{ area.status }}
                        </span>
                    </td>
                    <td data-label="Created At" class="date">
                        {{ area.createdAt }}
                    </td>
                </tr>
                <tr *ngIf="pagedBranchAreas.length === 0">
                    <td [attr.colspan]="7" class="no-data">No data available in table</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <app-pager
        [total]="totalItems"
        [pageSize]="pageSize"
        [currentPage]="currentPage"
        [pageSizeOptions]="pageSizeOptions"
        (pageChange)="onPageChange($event)"
        (pageSizeChange)="onPageSizeChange($event)">
    </app-pager>

    <!-- Empty state -->
    <app-empty-state
        *ngIf="branchAreas.length === 0 && !searchTerm"
        title="No Branch Areas Found"
        message="There are no branch areas available at the moment.">
    </app-empty-state>
</div>

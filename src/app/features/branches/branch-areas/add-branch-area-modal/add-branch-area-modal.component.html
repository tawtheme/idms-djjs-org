<app-modal
    [isOpen]="isOpen"
    [title]="'Add Branch Area'"
    [size]="'small'"
    [closable]="true"
    [showHeader]="true"
    [showFooter]="true"
    [footerButtons]="footerButtons"
    [footerAlign]="'right'"
    (close)="onClose()"
    (footerAction)="onFooterAction($event)">

    <form class="add-branch-area-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label class="form-label" for="branch">
                Branch
            </label>
            <app-dropdown
                [options]="branchOptions"
                [selectedValues]="branch ? [branch] : []"
                [closeOnSelect]="true"
                placeholder="Select Branch"
                (selectionChange)="onBranchChange($event)">
            </app-dropdown>
        </div>

        <div class="form-group">
            <label class="form-label" for="area-name">
                Branch Area Name <span class="required">*</span>
            </label>
            <input
                id="area-name"
                type="text"
                class="form-control"
                [(ngModel)]="areaName"
                [ngModelOptions]="{ standalone: true }"
                placeholder="Enter branch area name"
                required
                autofocus>
        </div>

        <div class="form-group">
            <label class="form-label" for="status">
                Status
            </label>
            <app-dropdown
                [options]="statusOptions"
                [selectedValues]="[status]"
                [closeOnSelect]="true"
                placeholder="Select Status"
                (selectionChange)="onStatusChange($event)">
            </app-dropdown>
        </div>
    </form>
</app-modal>

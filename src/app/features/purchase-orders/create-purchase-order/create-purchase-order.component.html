<div class="create-purchase-order-container">
    <div class="purchase-order-layout">
        <form (ngSubmit)="save()" #f="ngForm" class="form-sections">
            <!-- Section: Basic Information -->
            <div class="purchase-order-card">
                <div class="purchase-order-card-body">
                    <div class="form-grid cols-2">
                        <label>
                            <span>Purchase Order ID <span class="required">*</span></span>
                            <input name="purchase_order_id" [(ngModel)]="purchaseOrder.purchase_order_id" required class="form-control" placeholder="Auto-generated" [disabled]="true" />
                        </label>
                        <label>
                            <span>Purchase Type <span class="required">*</span></span>
                            <app-dropdown
                                [options]="purchaseTypeOptions"
                                [selectedValues]="getSelectedValues(purchaseOrder.purchase_type)"
                                (selectionChange)="onDropdownChange('purchase_type', $event)"
                                placeholder="Select purchase type"
                                [closeOnSelect]="true"
                                required>
                            </app-dropdown>
                        </label>
                        <label>
                            <span>Purchase Order Date <span class="required">*</span></span>
                            <app-datepicker
                                [value]="getPurchaseOrderDate()"
                                (dateChange)="purchaseOrder.purchase_order_date = $event ? $event.toISOString().split('T')[0] : ''"
                                format="yyyy-MM-dd"
                                placeholder="Select date"
                                required>
                            </app-datepicker>
                        </label>
                        <label>
                            <span>Expected Delivery Date <span class="required">*</span></span>
                            <app-datepicker
                                [value]="getExpectedDeliveryDate()"
                                (dateChange)="purchaseOrder.expected_delivery_date = $event ? $event.toISOString().split('T')[0] : ''"
                                format="yyyy-MM-dd"
                                placeholder="Select expected delivery date"
                                required>
                            </app-datepicker>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Section: Supplier Information -->
            <div class="purchase-order-card">
                <div class="purchase-order-card-title">Supplier Information</div>
                <div class="purchase-order-card-body">
                    <div class="form-grid cols-2">
                        <label>
                            <span>Supplier Name <span class="required">*</span></span>
                            <app-dropdown
                                [options]="supplierOptions"
                                [selectedValues]="getSelectedValues(purchaseOrder.supplier.supplier_id)"
                                (selectionChange)="onSupplierChange($event.length > 0 ? $event[0] : '')"
                                placeholder="Select supplier"
                                [searchable]="true"
                                [closeOnSelect]="true"
                                required>
                            </app-dropdown>
                        </label>
                        <label>
                            <span>&nbsp;</span>
                            <button type="button" class="add-supplier-button">
                                <span class="icon material-icons">add</span>
                                Add Supplier
                            </button>
                        </label>
                    </div>
                    <div class="form-grid cols-3">
                        <label>
                            <span>Contact Person</span>
                            <input name="contact_person" [(ngModel)]="purchaseOrder.supplier.contact_person" class="form-control" placeholder="Enter contact person name" />
                        </label>
                        <label>
                            <span>Phone</span>
                            <input type="tel" name="phone" [(ngModel)]="purchaseOrder.supplier.phone" class="form-control" placeholder="Enter phone number" />
                        </label>
                        <label>
                            <span>Email</span>
                            <input type="email" name="email" [(ngModel)]="purchaseOrder.supplier.email" class="form-control" placeholder="Enter email address" />
                        </label>
                    </div>
                </div>
            </div>

            <!-- Section: Items -->
            <div class="purchase-order-card">
                <div class="purchase-order-card-header">
                    <div class="purchase-order-card-title">Items</div>
                    <button 
                        type="button" 
                        class="btn btn--primary btn--sm" 
                        *ngIf="purchaseOrder.items.length > 0"
                        (click)="addNewItemSection()">
                        <span class="icon material-icons">add</span>
                        Add New Item
                    </button>
                </div>
                <div class="purchase-order-card-body">
                    <div class="items-list">
                        <!-- Item Sections - All items are editable -->
                        <div class="item-section" *ngFor="let item of purchaseOrder.items; let i = index">
                            <div class="item-section-body">
                                <div class="item-row">
                                    <div class="item-col">
                                        <label class="item-field-label">Item Name <span class="required">*</span></label>
                                        <app-dropdown
                                            [options]="itemOptions"
                                            [selectedValues]="getSelectedValues(item.item_id)"
                                            (selectionChange)="onItemChangeForExisting($event.length > 0 ? $event[0] : '', i)"
                                            placeholder="Select item"
                                            [searchable]="true"
                                            [closeOnSelect]="true">
                                        </app-dropdown>
                                        <textarea [(ngModel)]="item.description" [ngModelOptions]="{standalone: true}" (input)="calculateItemTotal(item)" class="form-control" rows="1" placeholder="Description"></textarea>
                                    </div>
                                    <div class="item-col">
                                        <label class="item-field-label">Quantity <span class="required">*</span></label>
                                        <input type="number" [(ngModel)]="item.quantity" [ngModelOptions]="{standalone: true}" (input)="calculateItemTotal(item)" class="form-control form-control--sm" placeholder="Qty" min="0" step="1" />
                                    </div>
                                    <div class="item-col">
                                        <label class="item-field-label">Unit Price <span class="required">*</span></label>
                                        <input type="number" [(ngModel)]="item.unit_price" [ngModelOptions]="{standalone: true}" (input)="calculateItemTotal(item)" class="form-control form-control--sm" placeholder="Price" min="0" step="0.01" />
                                    </div>
                                    <div class="item-col">
                                        <label class="item-field-label">Tax %</label>
                                        <input type="number" [(ngModel)]="item.tax_percent" [ngModelOptions]="{standalone: true}" (input)="calculateItemTotal(item)" class="form-control form-control--sm" placeholder="Tax %" min="0" step="0.01" />
                                    </div>
                                    <div class="item-col">
                                        <label class="item-field-label">Total</label>
                                        <input type="number" [(ngModel)]="item.total_amount" [ngModelOptions]="{standalone: true}" class="form-control form-control--sm" placeholder="Total" min="0" step="0.01" readonly />
                                    </div>
                                    <div class="item-col">
                                        <label class="item-field-label">&nbsp;</label>
                                        <button type="button" class="remove-button" (click)="removeItem(i)">
                                            <span class="icon material-icons">delete</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Add New Item Section - Show only when no items exist -->
                        <div class="item-section item-section--add" *ngIf="purchaseOrder.items.length === 0">
                            <div class="item-section-body">
                                <div class="item-row item-row--add">
                                    <div class="item-col">
                                        <label class="item-field-label">Item Name <span class="required">*</span></label>
                                        <app-dropdown
                                            [options]="itemOptions"
                                            [selectedValues]="getSelectedValues(newItem.item_id)"
                                            (selectionChange)="onItemChange($event.length > 0 ? $event[0] : '')"
                                            placeholder="Select item"
                                            [searchable]="true"
                                            [closeOnSelect]="true">
                                        </app-dropdown>
                                        <textarea [(ngModel)]="newItem.description" [ngModelOptions]="{standalone: true}" class="form-control" rows="1" placeholder="Description"></textarea>
                                    </div>
                                    <div class="item-col">
                                        <label class="item-field-label">Quantity <span class="required">*</span></label>
                                        <input type="number" [(ngModel)]="newItem.quantity" [ngModelOptions]="{standalone: true}" (input)="calculateItemTotal(newItem)" class="form-control form-control--sm" placeholder="Qty" min="0" step="1" />
                                    </div>
                                    <div class="item-col">
                                        <label class="item-field-label">Unit Price <span class="required">*</span></label>
                                        <input type="number" [(ngModel)]="newItem.unit_price" [ngModelOptions]="{standalone: true}" (input)="calculateItemTotal(newItem)" class="form-control form-control--sm" placeholder="Price" min="0" step="0.01" />
                                    </div>
                                    <div class="item-col">
                                        <label class="item-field-label">Tax %</label>
                                        <input type="number" [(ngModel)]="newItem.tax_percent" [ngModelOptions]="{standalone: true}" (input)="calculateItemTotal(newItem)" class="form-control form-control--sm" placeholder="Tax %" min="0" step="0.01" />
                                    </div>
                                    <div class="item-col">
                                        <label class="item-field-label">Total</label>
                                        <input type="number" [(ngModel)]="newItem.total_amount" [ngModelOptions]="{standalone: true}" class="form-control form-control--sm" placeholder="Total" min="0" step="0.01" readonly />
                                    </div>
                                    <div class="item-col">
                                        <label class="item-field-label">&nbsp;</label>
                                        <button type="button" class="btn btn--primary" (click)="addItem()">Add</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Section: Payment & Terms -->
            <div class="purchase-order-card">
                <div class="purchase-order-card-body">
                    <div class="purchase-order-summary">
                        <div class="summary-row">
                            <span class="summary-label">Subtotal:</span>
                            <span class="summary-value">{{ totals.subtotal | currency:'USD':'symbol':'1.2-2' }}</span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-label">Discount:</span>
                            <div class="summary-value-editable" *ngIf="!editingDiscount" (click)="startEditingDiscount()">
                                <span class="summary-value-clickable">-{{ totals.discount | currency:'USD':'symbol':'1.2-2' }}</span>
                            </div>
                            <div class="summary-value-edit" *ngIf="editingDiscount">
                                <span class="summary-edit-prefix">-</span>
                                <input 
                                    type="text" 
                                    [value]="discountEditValue"
                                    (input)="onDiscountInput($event)"
                                    (paste)="onDiscountPaste($event)"
                                    (blur)="saveDiscount()"
                                    (keydown)="onDiscountKeydown($event)"
                                    class="summary-edit-input" 
                                    placeholder="0.00"
                                    autofocus />
                            </div>
                        </div>
                        <div class="summary-row">
                            <span class="summary-label">Tax:</span>
                            <span class="summary-value">{{ totals.tax | currency:'USD':'symbol':'1.2-2' }}</span>
                        </div>
                        <div class="summary-row summary-row--total">
                            <span class="summary-label">Payable Amount:</span>
                            <span class="summary-value">{{ totals.total | currency:'USD':'symbol':'1.2-2' }}</span>
                        </div>
                    </div>
                    <div class="form-grid cols-1">
                        <label>
                            <textarea name="notes" [(ngModel)]="purchaseOrder.notes" class="form-control" rows="4" placeholder="Enter any additional notes or remarks"></textarea>
                        </label>
                    </div>
                    <div class="form-grid cols-1">
                        <label>
                            <span>Payment Terms</span>
                            <input name="payment_terms" [(ngModel)]="purchaseOrder.payment_terms" class="form-control" placeholder="e.g., 50% advance, 50% on delivery" />
                        </label>
                    </div>
                    <div class="form-grid cols-2">
                        <label>
                            <span>Mode of Payment</span>
                            <app-dropdown
                                [options]="paymentModeOptions"
                                [selectedValues]="getSelectedValues(purchaseOrder.mode_of_payment)"
                                (selectionChange)="onDropdownChange('mode_of_payment', $event)"
                                placeholder="Select payment mode"
                                [closeOnSelect]="true">
                            </app-dropdown>
                        </label>
                        <label>
                            <span>Status</span>
                            <app-dropdown
                                [options]="statusOptions"
                                [selectedValues]="getSelectedValues(purchaseOrder.status)"
                                (selectionChange)="onDropdownChange('status', $event)"
                                placeholder="Select status"
                                [closeOnSelect]="true">
                            </app-dropdown>
                        </label>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

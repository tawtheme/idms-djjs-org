<div class="shipments-container">
    <div class="shipments-header">
        <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
        <div class="shipments-actions">
            <a class="btn btn--primary btn--sm" [routerLink]="['/shipments/create']">New Shipment</a>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="listing-search">
        <div class="listing-search-item">
            <input
                type="search"
                class="form-control"
                placeholder="Shipment ID or Tracking Number"
                [(ngModel)]="shipmentId"
                [ngModelOptions]="{ standalone: true }"
                (input)="onSearchChange()"/>
        </div>
        <div class="listing-search-item">
            <app-dropdown
                [options]="carrierOptions"
                [selectedValues]="selectedCarrier"
                placeholder="Carrier"
                (selectionChange)="selectedCarrier = $event; onSearchChange()"
                [closeOnSelect]="true">
            </app-dropdown> 
            <app-datepicker
                [value]="fromDate"
                (dateChange)="fromDate = $event; onSearchChange()"
                format="yyyy-MM-dd"
                placeholder="Ship Date">
            </app-datepicker>
            <app-dropdown
                [options]="statusOptions"
                [selectedValues]="selectedStatus"
                placeholder="Status"
                (selectionChange)="selectedStatus = $event; onSearchChange()"
                [closeOnSelect]="true">
            </app-dropdown>
            <button class="btn btn--secondary btn--sm" type="button" (click)="resetFilter()">
                <span class="material-icons">refresh</span>
                Reset
            </button>
        </div>
    </div>

    <!-- Shipments table -->
    <div class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th>Shipment ID</th>
                    <th>Order ID</th>
                    <th>Carrier</th>
                    <th>Tracking Number</th>
                    <th>Ship Date</th>
                    <th>Status</th>
                    <th class="text-right">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let s of pagedShipments; trackBy: trackById" (click)="$event.stopPropagation()">
                    <td data-label="Shipment ID">
                        {{ s.id }}
                    </td>
                    <td data-label="Order ID" class="order-id">
                        {{ s.orderId }}
                    </td>
                    <td data-label="Carrier">
                        {{ s.carrier }}
                    </td>
                    <td data-label="Tracking Number">
                        {{ s.trackingNumber }}
                    </td>
                    <td data-label="Ship Date" class="date">
                        {{ s.shipDate | date:'yyyy-MM-dd' }}
                    </td>
                    <td data-label="Status" class="status">
                        <span class="status-badge" [ngClass]="getStatusClass(s.status)">
                            {{ formatStatus(s.status) }}
                        </span>
                    </td>
                    <td data-label="Actions" class="text-right">
                        <button class="btn btn--secondary btn--sm" (click)="openDetailPanel(s.id)">View details</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <app-pager
        [total]="totalItems"
        [pageSize]="pageSize"
        [currentPage]="currentPage"
        [pageSizeOptions]="pageSizeOptions"
        (pageChange)="onPageChange($event)"
        (pageSizeChange)="onPageSizeChange($event)">
    </app-pager>

    <!-- Empty state -->
    <app-empty-state
        *ngIf="shipments.length === 0"
        title="No Shipments Found"
        description="There are no shipments to display at the moment."
        icon="local_shipping"
        [showButton]="false">
    </app-empty-state>

    <!-- Shipment details side panel -->
    <app-side-panel
        [isOpen]="sidePanelOpen"
        title="Shipment Details"
        [width]="700"
        position="right"
        [closable]="true"
        (close)="closeDetailPanel()">
        <app-shipment-detail *ngIf="selectedShipmentId" [shipmentId]="selectedShipmentId"></app-shipment-detail>
    </app-side-panel>
</div>

<app-modal
    [isOpen]="isOpen"
    [title]="'Add New Project'"
    [size]="'small'"
    [closable]="true"
    [showHeader]="true"
    [showFooter]="true"
    [footerButtons]="footerButtons"
    [footerAlign]="'right'"
    (close)="onClose()"
    (footerAction)="onFooterAction($event)">
    
    <form class="add-project-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label class="form-label" for="project-name">
                Project Name <span class="required">*</span>
            </label>
            <input
                id="project-name"
                type="text"
                class="form-control"
                [(ngModel)]="name"
                [ngModelOptions]="{ standalone: true }"
                placeholder="Enter project name"
                required
                autofocus>
        </div>

        <div class="form-group">
            <label class="form-label" for="project-head">
                Project Head <span class="required">*</span>
            </label>
            <app-dropdown
                [options]="projectHeadOptions"
                [selectedValues]="projectHead ? [projectHead] : []"
                [closeOnSelect]="true"
                placeholder="Select Project Head"
                (selectionChange)="onProjectHeadChange($event)">
            </app-dropdown>
        </div>

        <div class="form-group">
            <label class="form-label" for="initiative">
                Initiative <span class="required">*</span>
            </label>
            <app-dropdown
                [options]="initiativeOptions"
                [selectedValues]="initiative ? [initiative] : []"
                [closeOnSelect]="true"
                placeholder="Select Initiative"
                (selectionChange)="onInitiativeChange($event)">
            </app-dropdown>
        </div>
        <div class="form-group">
            <label class="form-label" for="description">
                Description <span class="required">*</span>
            </label>
            <textarea
                id="description"
                class="form-control"
                [(ngModel)]="description"
                [ngModelOptions]="{ standalone: true }"
                placeholder="Enter project description"
                rows="4"
                required></textarea>
        </div>

        <div class="form-group">
            <label class="form-label" for="status">
                Status
            </label>
            <app-dropdown
                [options]="statusOptions"
                [selectedValues]="[status]"
                [closeOnSelect]="true"
                placeholder="Select Status"
                (selectionChange)="onStatusChange($event)">
            </app-dropdown>
         </div>
    </form>
</app-modal>

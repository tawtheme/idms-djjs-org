<div class="projects-container">
    <div class="projects-header">
        <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
    </div>

    <!-- Filter Section -->
    <div class="listing-search">
        <div class="listing-search-item">
            <app-dropdown
                [options]="taskBranchOptions"
                [selectedValues]="selectedTaskBranch"
                [searchable]="true"
                [closeOnSelect]="true"
                placeholder="Branch"
                (selectionChange)="onTaskBranchChange($event)">
            </app-dropdown>
        </div>
        <button class="btn btn--primary btn--sm" type="button" (click)="openAddModal()">
            Add New
        </button>
    </div>

    <!-- Projects table -->
    <div class="listing-wrapper">
        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th (click)="sortBy('name')" class="sortable">
                            Name
                            <app-icon [name]="getSortIcon('name')" class="sort-icon" />
                        </th>
                        <th (click)="sortBy('projectHead')" class="sortable">
                            Project Head
                            <app-icon [name]="getSortIcon('projectHead')" class="sort-icon" />
                        </th>
                        <th (click)="sortBy('initiativeName')" class="sortable">
                            Initiative Name
                            <app-icon [name]="getSortIcon('initiativeName')" class="sort-icon" />
                        </th>
                        <th>Description</th>
                        <th>Status</th>
                        <th (click)="sortBy('createdAt')" class="sortable">
                            Created At
                            <app-icon [name]="getSortIcon('createdAt')" class="sort-icon" />
                        </th>
                        <th class="action-column">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <ng-container *ngIf="!isLoading">
                        <tr *ngFor="let project of pagedProjects; trackBy: trackById" (click)="$event.stopPropagation()">
                            <td data-label="Name" class="name">
                                {{ project.name }}
                            </td>
                            <td data-label="Project Head">
                                {{ project.projectHead }}
                            </td>
                            <td data-label="Initiative Name">
                                {{ project.initiativeName }}
                            </td>
                            <td data-label="Description">
                                {{ project.description }}
                            </td>
                            <td data-label="Status" class="status">
                                <span class="status-badge" [ngClass]="'status-' + (project.status | lowercase)">
                                    {{ project.status }}
                                </span>
                            </td>
                            <td data-label="Created At" class="date">
                                {{ project.createdAt }}
                            </td>
                            <td data-label="Action" class="action-column" (click)="$event.stopPropagation()">
                                <app-menu-dropdown
                                    [options]="getActionOptions(project)"
                                    (selectionChange)="onAction(project, $event)">
                                </app-menu-dropdown>
                            </td>
                        </tr>
                        <!-- Empty state -->
                        <tr *ngIf="pagedProjects.length === 0">
                            <td [attr.colspan]="7" class="empty-state-cell">
                                <app-empty-state
                                    [title]="searchTerm ? 'No Results Found' : 'No Projects Found'"
                                    [description]="searchTerm ? 'No projects match your search criteria.' : 'There are no projects available at the moment.'"
                                    [size]="'small'">
                                </app-empty-state>
                            </td>
                        </tr>
                    </ng-container>
                    <!-- Loading cell -->
                    <tr *ngIf="isLoading">
                        <td [attr.colspan]="7" class="loading-cell">
                            <app-loading [size]="'medium'" [type]="'spinner'"></app-loading>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <app-pager
            [total]="totalItems"
            [pageSize]="pageSize"
            [currentPage]="currentPage"
            [pageSizeOptions]="pageSizeOptions"
            (pageChange)="onPageChange($event)"
            (pageSizeChange)="onPageSizeChange($event)">
         </app-pager>
     </div>

     <!-- Add New Project Modal - Only render when needed -->
     <app-add-project-modal
         *ngIf="isAddModalOpen"
         [isOpen]="isAddModalOpen"
         (close)="closeAddModal()"
         (submit)="onAddProjectSubmit()">
     </app-add-project-modal>
 </div>

<div class="jobs-container">
    <div class="jobs-header">
        <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
        <div class="jobs-actions">
            <a class="btn btn--primary btn--sm" [routerLink]="['/jobs/create']">New Job</a>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="listing-search">
        <div class="listing-search-item">
            <input
                type="search"
                class="form-control"
                placeholder="Search jobs by ID, title, company, assignee, or status"
                [(ngModel)]="searchQuery"
                [ngModelOptions]="{ standalone: true }"
                (input)="onSearchChange()"
            />
        </div>
        <div class="listing-search-item">
            <app-dropdown
                [options]="assignedOptions"
                [selectedValues]="selectedAssigned"
                placeholder="Assigned"
                (selectionChange)="selectedAssigned = $event; onSearchChange()"
                [closeOnSelect]="true">
            </app-dropdown>
            <app-dropdown
                [options]="statusOptions"
                [selectedValues]="selectedStatus"
                placeholder="Status"
                (selectionChange)="selectedStatus = $event; onSearchChange()"
                [closeOnSelect]="true">
            </app-dropdown>
            <button class="btn btn--secondary btn--sm" type="button" (click)="resetFilter()">
                <span class="material-icons">refresh</span>
                Reset
            </button>
        </div>
    </div>

    <!-- Jobs Table -->
    <div class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th>Job ID</th>
                    <th>Title</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th>Current Stage</th>
                    <th class="text-right">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let j of pagedJobs">
                    <td data-label="Job ID">{{ j.job_id }}</td>
                    <td data-label="Title">{{ j.job_title }}</td>
                    <td data-label="Due Date">{{ j.due_date | date:'yyyy-MM-dd' }}</td>
                    <td data-label="Status" class="status">
                        <span class="status-badge" [ngClass]="'status-' + (j.status | lowercase)">{{ j.status }}</span>
                    </td>
                    <td data-label="Current Stage" class="job-stage">
                        <div class="job-workflow-compact">
                            <div class="current-stage-info">
                                <span class="current-stage-label">{{ getCurrentStageLabel(j) }}</span>
                                <span class="stage-progress">{{ getStageProgress(j) }}%</span>
                            </div>
                            <div class="workflow-progress-bar">
                                <div 
                                    *ngFor="let stage of jobStages; let i = index"
                                    class="progress-segment"
                                    [appTooltip]="stage.label"
                                    tooltipPosition="top"
                                    [class.completed]="isStageCompleted(j, stage.key)"
                                    [class.current]="isCurrentStage(j, stage.key)"
                                    [class.pending]="!isStageCompleted(j, stage.key) && !isCurrentStage(j, stage.key)"
                                >
                                </div>
                            </div>
                        </div>
                    </td>
                    <td data-label="Actions" class="text-right" (click)="$event.stopPropagation()">
                        <app-menu-dropdown
                            [options]="actionOptions"
                            (selectionChange)="onAction(j, $event)">
                        </app-menu-dropdown>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <app-pager
        [total]="totalItems"
        [pageSize]="pageSize"
        [currentPage]="currentPage"
        [pageSizeOptions]="pageSizeOptions"
        (pageChange)="onPageChange($event)"
        (pageSizeChange)="onPageSizeChange($event)">
    </app-pager>

    <!-- Job details modal -->
    <app-modal
        [isOpen]="detailModalOpen"
        title="Job Details"
        size="extraLarge"
        [closable]="true"
        [showHeader]="true"
        [showFooter]="false"
        (close)="closeDetailModal()">
        <app-job-detail *ngIf="selectedJobId" [jobId]="selectedJobId" (cancel)="closeDetailModal()"></app-job-detail>
    </app-modal>
</div>

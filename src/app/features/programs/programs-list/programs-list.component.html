<div class="programs-container">
    <!-- Loading -->
    <div *ngIf="isLoading" class="loading-wrapper">
        <app-loading [size]="'medium'" [type]="'spinner'"></app-loading>
    </div>

    <ng-container *ngIf="!isLoading">
        <div class="programs-header">
            <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
            <button class="btn btn--primary btn--sm" type="button" (click)="openAddModal()">Add New</button>
        </div>

        <!-- Error state -->
        <div *ngIf="error" class="error-state">
            <p>{{ error }}</p>
            <button class="btn btn--primary btn--sm" (click)="loadPrograms()">Retry</button>
        </div>

        <!-- Search & Filter Panel -->
        <div class="search-panel" *ngIf="!error">
        <div class="search-panel__top">
            <app-dropdown
                [options]="taskBranchOptions"
                [selectedValues]="selectedTaskBranch"
                placeholder="Task Branch"
                [searchable]="true"
                (selectionChange)="selectedTaskBranch = $event; onTaskBranchChange()"
                [closeOnSelect]="true">
            </app-dropdown>
            <app-dropdown
                [options]="initiativeOptions"
                [selectedValues]="selectedInitiative"
                placeholder="Initiative"
                [searchable]="true"
                (selectionChange)="selectedInitiative = $event; applyFilters()"
                [closeOnSelect]="true">
            </app-dropdown>
            <app-dropdown
                [options]="projectOptions"
                [selectedValues]="selectedProject"
                placeholder="Project"
                [searchable]="true"
                (selectionChange)="selectedProject = $event; applyFilters()"
                [closeOnSelect]="true">
            </app-dropdown>
            <div class="search-input-wrapper">
                <app-icon name="search" class="search-input-icon" />
                <input
                    type="search"
                    class="search-input"
                    placeholder="Search by Name, Coordinator, Initiative, Project"
                    [(ngModel)]="searchTerm"
                    [ngModelOptions]="{ standalone: true }"
                    (keyup.enter)="applyFilters()" />
            </div>
            <app-date-range-picker
                [fromDate]="startDate"
                [toDate]="endDate"
                placeholder="Select Date Range"
                (dateRangeChange)="onDateRangeChange($event)">
            </app-date-range-picker>
            <button class="btn btn--outline btn--sm" type="button" (click)="applyFilters()">
                Search
            </button>
        </div>
    </div>

    <!-- Programs Cards -->
    <div class="listing-wrapper">
        <!-- Empty state -->
        <div *ngIf="pagedPrograms.length === 0" class="empty-wrapper">
            <app-empty-state
                [title]="searchTerm ? 'No Results Found' : 'No Programs Found'"
                [description]="searchTerm ? 'No programs match your search criteria.' : 'There are no programs available at the moment.'"
                [size]="'small'">
            </app-empty-state>
        </div>

        <!-- Program Cards -->
        <div class="program-cards" *ngIf="pagedPrograms.length > 0">
            <div class="program-card" *ngFor="let program of pagedPrograms; trackBy: trackById">
                <div class="card-top">
                    <div class="card-title-row">
                        <h3 class="card-title">{{ program.name }}</h3>
                        <div class="card-actions">
                            <span class="status-badge" [ngClass]="'status-' + (program.status | lowercase)">
                                {{ program.status }}
                            </span>
                            <app-menu-dropdown
                                [options]="getActionOptions(program)"
                                (selectionChange)="onAction(program, $event)">
                            </app-menu-dropdown>
                        </div>
                    </div>
                    <div class="card-meta">
                        <span class="meta-item">
                            <app-icon name="person" class="meta-icon" />
                            {{ program.programCoordinator }}
                        </span>
                        <span class="meta-item">
                            <app-icon name="location_city" class="meta-icon" />
                            {{ program.taskBranch }}
                        </span>
                    </div>
                </div>
                <div class="card-details">
                    <div class="detail-item">
                        <span class="detail-label">Initiative</span>
                        <span class="detail-value">{{ program.initiativeName }}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Project</span>
                        <span class="detail-value">{{ program.projectName }}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Duration</span>
                        <span class="detail-value">{{ program.startDateTime }} — {{ program.endDateTime }}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Created</span>
                        <span class="detail-value">{{ program.createdAt }}</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <app-pager
            *ngIf="!error"
            [total]="totalItems"
            [pageSize]="pageSize"
            [currentPage]="currentPage"
            [pageSizeOptions]="pageSizeOptions"
            (pageChange)="onPageChange($event)"
            (pageSizeChange)="onPageSizeChange($event)">
        </app-pager>
    </div>
    </ng-container>

    <!-- Delete Confirmation Dialog -->
    <app-confirmation-dialog
        *ngIf="showDeleteConfirm"
        [isOpen]="showDeleteConfirm"
        title="Delete Program"
        [message]="'Are you sure you want to delete' + (deleteProgramTarget?.name || '') + 'This action cannot be undone.'"
        [highlightText]="deleteProgramTarget?.name || ''"
        confirmLabel="Delete"
        cancelLabel="Cancel"
        confirmType="danger"
        (confirm)="onDeleteConfirm()"
        (cancel)="onDeleteCancel()">
    </app-confirmation-dialog>
</div>

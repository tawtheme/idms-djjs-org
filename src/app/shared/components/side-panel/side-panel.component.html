<ng-template #panelTemplate>
    <div class="side-panel" [class.side-panel-left]="position === 'left'" [class.side-panel-right]="position === 'right'">
        <div class="side-panel__header" *ngIf="title || closable">
            <div class="side-panel__title" *ngIf="title">{{ title }}</div>
            <button 
                *ngIf="closable"
                class="side-panel__close" 
                (click)="onCloseClick()"
                aria-label="Close panel">
                <span class="material-icons">close</span>
            </button>
        </div>
        <div class="side-panel__body">
            <ng-content></ng-content>
        </div>
        @if (showFooter || footerButtons.length > 0) {
            <div class="side-panel__footer" [class]="'footer-' + footerAlign">
                <ng-content select="[slot=footer]"></ng-content>
                @if (footerButtons.length > 0) {
                    @for (button of footerButtons; track button.text) {
                        <button 
                            (click)="onFooterButtonClick(button)"
                            [disabled]="button.disabled"
                            [class]="'btn btn--' + button.type + ' btn--md'">
                            {{ button.text }}
                        </button>
                    }
                }
            </div>
        }
    </div>
</ng-template>

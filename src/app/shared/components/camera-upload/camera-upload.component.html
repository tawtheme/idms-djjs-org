<div class="camera-upload" [class.disabled]="disabled">
    @if (!capturedImageFile) {
        @if (isCropping) {
            <!-- Crop step -->
            <div class="cropper-container">
                <div class="cropper-stage">
                    <image-cropper
                        [imageBase64]="rawImageBase64"
                        [maintainAspectRatio]="true"
                        [aspectRatio]="aspectRatio"
                        [resizeToWidth]="1024"
                        [cropperMinWidth]="64"
                        [containWithinAspectRatio]="false"
                        format="jpeg"
                        [transform]="imageTransform"
                        output="blob"
                        (imageCropped)="onCropped($event)"
                        (imageLoaded)="onCropperLoaded($event)"
                        (loadImageFailed)="onCropperFailed()">
                    </image-cropper>
                </div>
                <div class="camera-controls">
                    <button type="button" class="btn btn--secondary btn--sm" (click)="rotateLeft()" [disabled]="disabled">
                        <app-icon name="rotate_left" />
                    </button>
                    <button type="button" class="btn btn--secondary btn--sm" (click)="rotateRight()" [disabled]="disabled">
                        <app-icon name="rotate_right" />
                    </button>
                    <button type="button" class="btn btn--secondary btn--sm" (click)="retake()" [disabled]="disabled">
                        Retake
                    </button>
                    <button type="button" class="btn btn--primary btn--sm" (click)="confirmCrop()" [disabled]="disabled || !croppedBlob">
                        <app-icon name="check" />
                        Use Photo
                    </button>
                </div>
            </div>
        } @else if (isStreaming) {
            <!-- Camera Preview -->
            <div class="camera-preview-container">
                <div class="video-container">
                    <video
                        #videoElement
                        autoplay
                        playsinline
                        muted
                        class="camera-video">
                    </video>
                    <canvas #canvasElement style="display: none;"></canvas>
                </div>
                <div class="camera-controls">
                    <button
                        type="button"
                        class="btn btn--secondary btn--sm"
                        (click)="cancelCapture()"
                        [disabled]="disabled">
                        Cancel
                    </button>
                    <button
                        type="button"
                        class="btn btn--primary btn--sm capture-btn"
                        (click)="captureImage(); $event.stopPropagation()"
                        [disabled]="disabled || !isStreaming"
                        [attr.aria-label]="'Capture image'">
                        <app-icon name="camera_alt" />
                        Capture
                    </button>
                </div>
            </div>
        } @else if (hasError) {
            <div class="drop-zone drop-zone--error">
                <div class="drop-zone-inner">
                    <div class="drop-zone-content">
                        <app-icon name="error_outline" />
                        <div class="drop-text">{{ errorMessage || 'Permission dismissed' }}</div>
                    </div>
                    <button type="button" class="btn btn--primary btn--sm" (click)="retryCamera()" [disabled]="disabled">
                        Retry
                    </button>
                </div>
            </div>
        } @else {
            <!-- Initial State - Drop Zone Style -->
            <div class="drop-zone" (click)="startCamera()">
                <div class="drop-zone-inner">
                    <div class="drop-zone-content">
                        <app-icon name="camera_alt" />
                        <div class="drop-text">
                            Capture Live Photo
                        </div>
                    </div>
                    <button type="button" class="btn btn--primary btn--sm" [disabled]="disabled">
                        Capture
                    </button>
                </div>
            </div>
        }
    } @else {
        <!-- Image Preview -->
        <div class="image-preview-container">
            <div class="image-preview-wrapper">
                <img [src]="capturedImagePreview || ''" [alt]="capturedImageFile!.name || 'Captured image'" class="preview-image">
                <button
                    type="button"
                    class="delete-image-btn"
                    (click)="removeFile()"
                    title="Delete image"
                    [disabled]="disabled">
                    <app-icon name="delete" />
                </button>
            </div>
        </div>
    }
</div>
